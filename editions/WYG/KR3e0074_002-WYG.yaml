body:
  text: 石山醫案卷中明陳桷撰吐血咳血一人年三十餘形瘦神瘁性急作勞傷於酒色仲冬吐血二盥盆腹脹腸鳴不喜食飲醫作隂虛治不應明年春又作食積治更灸中脘章門復吐血碗許灸瘡不潰令食鮮魚愈覺不爽下午微發寒熱不知饑飽予診其脉濇細而弱右脉尤覺弱而似弦曰此勞倦飲食傷脾也宜用參茋白术歸身甘草甘温以養脾生地麥門冬山枝甘寒以凉血陳皮厚朴辛苦以行滯随時暄凉加减煎服乆乆庶或可安三年病愈後往臨清買賣復縱酒色遂大吐血頓没一人年二十餘形瘦色脆病咳血醫用滋隂降火及清肺之藥延及二年不减又一醫用茯苓補心湯及參蘇飲皆去人參服之病增邀予診之脉細而數有五至餘曰不可為也或曰脉訣云四至五至平和之則何謂不可為予曰經云五臟已衰六腑已極九候雖調猶死是也且視形症皆屬死候經曰肉脱熱甚者死𠻳而加汗者死𠻳而下泄上喘者死𠻳而左不得眠肝脹右不得眠肺脹俱為死症今皆犯之雖飲食不過肌膚去死近矣越五日果卒凡患虛勞犯前數症又或𠻳而喉痛聲啞不能藥或𠻳而肛門發瘻皆在不救醫者不可不知一人年三十時過於勤勞嘔血彼甚憂惶予為診之脉皆緩弱曰無慮也由勞倦傷脾耳遂用參茋歸木陳皮甘草麥門冬等煎服月餘而愈越十餘年呌號傷氣加以過飽病膈壅悶有痰間或咯紅噎酸飲食難化小便短赤大便或溏有時滑泄不止睡醒口苦夢多或夢遺醫用胃苓湯病甚邀予診視脉或前大後小或駛或緩或細或大或弱或弦並無常度其細緩弱時常多曰五臟皆受氣於脾脾傷食减五臟俱無所禀矣故脉之不常脾之虛也藥用補脾庶幾允當遂以參术為君茯芍為臣陳皮神麯貝母為佐甘草黄栢為使服之㵼止食進後復傷食前病又作曰再用湯藥腸胃習熟而反見化於藥矣服之何益令以參苓白术散加肉荳䓻棗湯調下累驗又傷於食改用參术芍苓陳皮砂仁丸服大便即㵼曰脾虛甚矣陳皮砂仁尚不能當况他消導藥乎惟宜節食静以守之勿藥可也問命脉如何予曰孟子云夭夀不貳修身以俟之所以立命也夫夀夭固有定命而人不可委之於命而不修也人生於世如燭在籠火在灰也罩以籠壅以灰則燭與火可保無虞人能逺色節食養性存心使汗不妄泄精不妄施數雖有修短而得以終其修短之數命雖有天速而得以盡其夭速之期苟或反是譬猶燭之徹籠且置之雨側則東流西缺無復完物修者短短者亦不得以終其命矣譬如火之失灰且移之風外左吹右擊無復全體夀者天夭者不得盡其數矣故曰君子修之吉小人悖之㓙又曰静者夀動者夭又曰自作孽不可活又曰禍福無不自己求之者聖賢叮嚀告戒無非欲人自保其命不可􅆷害其命也脉則氣血之徴兆氣血和則脉和氣血病則脉病但可以知其病耳命則在人不在於脉也故曰命在我一人年五十形色蒼白性急語不合則呌號氣喊嘔吐一日左妳下忽一㸃痛後又過勞惱怒腹中覺有穢氣衝上即𠻳極吐或亦乾欬無痰甚則嘔血時發如瘧或以瘧治或以痰治或以氣治藥皆不效予往診之脉皆浮細畧弦而駛曰此土虛木旺也性急多怒肝火時動故左妳下痛者肝氣鬱也穢氣衝者肝火凌脾而逆上也嘔血者肝被火擾不能藏其血也咳𠻳者金失所養又受火尅而然也嘔吐者脾虛不能運化食鬱為痰也寒熱者木火交戰也兹宜泄肝木之實補脾土之虛清肺金之燥庶幾可安遂以青皮山枝各七分白芍黄茋麥門冬各一錢歸身阿膠各七分甘草五味各五分白术錢半人參三錢煎服月餘諸症盡釋一人年逾三十形色清癯病咳𠻳吐痰或時帶紅飲食無味易感風寒行歩喘促夜夢紛紜又有􅒃疝醫用芩連二陳或用四物降火或用清肺初服俱效乆則不應邀予診之脉皆浮濡無力而緩右手脾部濡弱頗弦曰此脾病也脾屬土為肺之母虛則肺子失養故發為咳𠻳又肺主皮毛失養則皮毛踈豁而風寒易入又脾為心之子子虛則竊母氣以自養而母亦虛故夜夢不安脾屬濕濕喜下流故入肝為􅒃疝且􅒃疝不痛而屬濕宜用參术茯苓補脾為君歸身麥門冬黄芩清肺養心為臣川芎陳皮山查散鬱去濕為佐煎服累效後以參四錢茋三錢术錢半茯苓一錢桂枝一錢常服而安暘源謝大尹年四十時房勞病咳血頭眩脚弱口氣夢遺或時如冷水滴於身者數㸃詣予診視脉皆濡緩而弱獨左關沉㣲按之不應曰此氣虛也彼謂房勞咳血夢遺皆血病也左關沉㣲亦主血病且聞肥人白人病多氣虛今我形色蒼紫何謂氣虛予曰初病傷腎經云腎乃胃之關也關既失守胃亦傷矣故氣壅逆血隨氣逆而咳也又經云二陽之病發心脾男子少精女子不月二陽者腸胃也腸胃之病必延及心脾故夢遺亦有由於胃氣之不固也左手關部細而分之雖屬肝而主血槩而論之而寸俱主上焦而察心肺兩關俱主中焦而察脾胃兩尺俱主下焦而察肝腎是左關亦可以察脾胃之病也古人治病有憑症有憑脉者有憑形色者今當憑症憑脉而作氣虛議治焉遂用參茋各三錢白术白芍歸身麥門冬各一錢茯神枝子酸棗仁各八分陳皮甘草各五分煎服朝服六味地黄丸加黄栢椿根皮夜服安神丸年餘而安越十餘歲致政歸田再為診之右手三部脉皆隱而不見身又無病此亦事之異也世謂太素脉法片時診候能知人終身禍福豈理也哉一人形瘦色悴年三十餘因勞咳𠻳吐血或自汗痞滿每至早晨𠻳甚吐痰如腐渣乳汁者一二碗仍復吐盡所食稍定醫用參蘇飲及枳縮二陳湯彌年弗效衆皆危之邀予診治脉皆濡弱近駛曰此脾虛也宜用參茋或曰乆𠻳肺有伏火雜著云咳血嘔血肺受火邪二者禁用參茋今病犯之而用禁藥何耶予曰此指肺𠻳言也五藏俱有𠻳今此在脾丹溪曰脾具坤靜之德而有乾健之運脾虛不運則氣壅逆肺為之動而𠻳也故脾所裹之血胃所藏之食亦隨氣逆而嘔吐焉兹用甘温以補之則脾復其乾健之運殆必壅者通逆者順肺寧而𠻳止胃安而嘔除血和而循經又何病之不去哉遂以參茋為君白术茯苓麥門冬為臣陳皮神麯歸身為佐甘草黄芩乾姜為使煎服旬餘遂安一人形色頗實年四十餘病𠻳咯血而喘不能伏枕醫用參蘇飲清肺飲皆不效予診之脉皆浮而近駛曰此酒熱傷肺也令嚼太平丸六七粒其𠻳如失村庄一婦年五十餘乆𠻳咯膿血日輕夜重詣診視脉皆細濡而滑曰此肺痿也曾服何藥出示其方非人參清肺散乃知母茯苓湯也二藥皆犯人參半夏一助肺中伏火一燥肺之津潤故病益加為處一方天麥門冬阿膠貝母為君知母生地紫苑山枝為臣桑白皮馬兠鈴為佐欵冬花歸身甜葶􅏣桔梗甘草為使煎服五貼遂安一人年逾三十形近肥色淡紫冬月感寒咳𠻳痰有血絲頭眩體倦醫作傷寒發散不愈更醫用四物加黄栢知母益加身熱自汗胸膈痞悶大便滑㵼飲食不進夜不安寢詣予診治右脉洪緩無力左脉緩小而弱曰此氣虛也彼謂痰中有紅或咯黒痰者皆血病也古人云黒人氣實今我形色近黒何謂氣虚予曰古人治病有憑色者有憑脉者丹溪云脉緩無力者氣虛也今脉皆緩弱故知為氣虛矣氣宜温補反用寒凉陽宜升舉反用降下又加以發散則陽氣之存也㡬希遂用參茋各四錢茯苓白芍麥門冬各一錢歸身八分黄芩陳皮神麯各七分蒼术甘草各五分中間雖稍有加减不過兼以行滯散鬱而已煎服百貼而安一人形色蒼白年三十餘咳𠻳咯血聲啞夜熱自汗邀予診視脉皆細濡近駛曰此得之色欲也遂以四物加麥門冬紫苑阿膠黄栢知母煎服三十餘貼諸症悉减又覺胸腹痞滿惡心畏食或時糞溏診之脉皆緩弱無復駛矣曰今隂虛之病已退再用甘温養其脾胃則病根去矣遂以四君子湯加神麯陳皮麥門冬服十餘貼病安視前尤健一人年逾三十形瘦色脆過於房勞病怠惰嗜卧食後腹痛多痰覺自胃中而上又吐酸水肺氣不清聲音不亮已更數醫或用補隂消導等劑邀予診治脉皆細濡無力約有七至問曰熱乎曰不覺曰𠻳乎夜間數聲而已曰大便何如近来帶溏糞門傍生一癤今已潰膿未收口耳曰最苦者何夜卧不安四肢無力而已予思脉病不應夫數脉主熱今覺不熱乃内蒸骨髓歟或正氣已極無復能作熱歟據症似難起矣何也虛勞糞門生癤必成瘻瘡脉不數者尚不可為况脉數乎葢肺為吸門司上大腸為肛門司下肺與大腸府藏相通况肺為氣主氣陽當升虛則下䧟所謂物極則反也今病内熱燔灼肺氣久傷故下䧟肛門而生癤瘻肺傷極矣非藥能濟予遂告歸月餘果卒故凡虛勞之病或久泄或左或右一邊不得眠者法皆不治也消渴一婦年三十餘常患消渴善饑脚弱冬亦不寒小便白濁浮於上者如油予診脉皆細弱而緩右脉尤弱曰此脾癉也宜用甘温助脾甘寒潤燥方用參茋各錢半麥門冬白术各一錢白芍天花粉各八分黄栢知母各七分煎服病除後口味不謹前病復作不救彚萃一人形長蒼紫素善食喜啖肉年近六十時六月傷饑又被雨濕既而過食冷物腹中疼脹嘔吐次年至期前病復作醫作傷食或作冷氣率用香燥消導之藥時作時止第三年十月病又作食則胃脘勵痛近来怱吐瘀血如指者三四條大便溏㵼亦皆穢汚又常屢被盗驚今猶卧則驚寤予診左脉沉弱右脉浮虛但覺頗弦次早復診左脉濡小無力右脉虛豁令用人參二錢白术錢半茯神當歸生地黄茋酸棗仁各一錢石菖蒲五分山枝七分五貼覺力健而食進尚噯氣失氣未除飲食少味令人參加作三錢白术加作二錢服愈一人年十九形瘦靣色黄白三月間微覺身熱五月間因勞傷於酒肉遂大熱膈悶夢遺盗汗午後熱甚或作食積或作隂虚或作痰火治皆不應予為診之午間脉皆洪滑予曰食飽之餘脉不定也来早再診脉皆收歛而弱右脉尤弱遂以人參三錢黄茋錢半白术麥門冬各一錢黄栢知母山查各七分枳實甘草各五分煎服一貼熱减汗除五服去泰去甚惟夢遺一月或二次或三次令服固精丸五六兩仍令節食守淡味病當愈也後又覺熱前方减甘草加石膏錢半牡丹皮八分一人年三十形瘦淡紫纔覺氣壅腹痛背脹則吐腹中氣塊翻動嘈雜數日乃吐黒水一盥盆而作酸氣吐後噯氣飲食不進過一二日方食大便二三日不通小便一日一次常時難向右卧午後怕食食則反飽脹痛行立坐卧不安日輕夜重二年後詣予診治脉皆浮弦細弱曰此脾虚也脾失健運故氣鬱而脹痛吐黒水者盖因土虚不能制水故膀胱之邪乘虚而侮其脾土經云以不勝侮其所勝是也酸者木之所司脾土既虚水挾木勢而凌之焉醫作痰治而用二陳剛劑則脾血愈虚又作血治而用四物柔劑則是以滯益滯又作熱治而用黄連解毒則過於苦寒又作氣治而用丁沉藿香則過於香燥俱不適中遂以人參三錢黄茋錢半歸身一錢香附陳皮神麯各七分黄芩甘草各五分吳茱萸三分煎服旬餘又犯油膩病作如前而尤重仍以前方加减或湯或散丸服至半年而愈一人年逾三十形色瘦黒飲食倍進食後吐酸食飯乾惡難吞常有結痰注于胸中不上不下纔勞則頭暈眼花或時鼻衂糞後去紅或黒午後至晩胸膈煩熱眉心時疼好睡醒来口舌乾苦盗汗夢遺脚冷手及臀尖生膿疱瘡醫以四物湯凉血之劑治之不效詣予診治左脉小弱而數右脉散弱而數俱近六至曰症脉皆屬隂虚作隂虚治之不效何也此必脾虚濕鬱為熱而然也今用滋隂降火反滋濕而生熱病何由安宜用參茋甘温之劑補脾去濕可焉問曰丹溪論瘦黒者鼻衂者脉數者參茋皆所當禁予曰固也豈可執為定論而不知變可乎脉經云數脉所主其邪為熱其症為虚遂以人參二錢黄茋錢半白术麻黄根生地茯苓麥門冬各一錢歸身川芎各八分黄芩七分麥芽厚朴黄栢枳實五味各五分服之而愈因勞病瘧仍用前方除麻黄根牡蠣麥芽枳實厚朴黄栢五味加澤㵼柴胡青皮山梔各七分甘草五分服十餘貼胸腹腰臍生小疥而愈一人於㓜時悞服毒藥㵼痢後復傷食腹痛大泄不止今雖能食不作腹痛每至六七月遇服毒藥之時痛泄復作善飢多食胸膈似冷夜間發熱嗜卧懶語聞淫欲言盗汗陽舉心動驚悸喉中有痰小便不利大便或結或溏過食則􅀈吐㵼泄脉皆濡弱而緩右脉略大尤覺弱也次日左脉三五不調或一二至緩三五至駛右脉如舊緩弱余曰左脉不調者此必欲動揺其精也右脉尤弱者由於毒藥損其肺也理宜固腎養脾遂以人參錢半白术茯苓芍藥黄茋麥門冬各一錢歸身澤㵼各八分黄栢知母山查各七分煎服旬餘而安一人年五十餘形色蒼古五月間泛水與人爭辨冐雨勞役受飢且有内事夜半忽病發熱惡食上吐下㵼昏悶煩燥頭痛身痛因自發汗汗遂不止遣書来示脉皆洪數予曰脉果洪數乃危症矣盖吐㵼内虚汗多表虚兼之脉不為汗衰亦不為瀉減在法不治但古人有言醫而不活者有也未有不醫而活者也令用人參五錢以救裏黄茋五錢以救表白术三錢乾姜七分甘草五分以和中安胃白茯苓一錢陳皮七分以清神理氣水煎不時温服一酒盃看其病勢何如服至六七貼則見紅斑而四肢尤甚靣赤身及四肢脹悶人来告急予曰斑症自吐泄者多吉謂邪從上下出也但傷寒發斑胃熱所致今此發班由胃虚而無根失守之火逰行於外也可補而不可泄可温而不可凉若用化斑湯𤣥參升麻之類則死生反掌矣仍令守前方服十餘貼諸病悉減斑則成瘡肢腫亦消而愈一人形短蒼白平素善飲五月間忽發寒熱醫作瘧治躁渇益甚時常啖梨􅀈吐痰多每次或至椀許飲食少進頭暈昏悶大便不通小便如常或赤夜夢不安或一日連發二次或二日三日一發或連發二日平素兩闗脉亦浮洪邀予適以事阻令服獨參湯二三貼􅀈吐少止寒熱漸住三日他醫曰渇甚脉洪熱之極矣復用獨參以助其熱非殺之而何及予往視脉皆浮洪近數予曰此非瘧而亦非熱也脉洪者隂虚陽無所附孤陽將欲飛越故脉見此其病屬虚非屬熱也渇甚者胃虚津少不能上朝於口亦非熱也盖年逾六十血氣已衰加以瘧藥性皆躁烈又當壯火食氣之時老人何以堪此然則邪重劑輕非參所能獨治遂以參茋各七錢歸身麥門冬各一錢陳皮七分甘草五分水煎每次温服一酒盃服至六七貼痰止病除食進大便旬餘不通導之以􅁡仍令服三十餘貼以斷病根續後脉亦收歛而緩非復向之鼓擊而駛也一人年逾三十形瘦蒼白病食則胸膈痞悶汗多手肘汗出尤多四肢倦怠或麻晩食若遲来早必泄初取其脉浮軟近駛兩闗脉乃略大予曰此脾虚不足也彼曰已服參术膏胸膈亦覺痞悶恐病不宜於參茋耶予曰膏則稠粘難以行散故也改用湯劑痞或愈乎令用參茋各二錢白术錢半歸身八分枳實甘草各五分麥門冬一錢煎服一貼上覺胸痞下覺失氣彼疑參茋使然予曰非也若參茋使然只當胸痞不當失氣恐由脾胃過虚莫當枳朴之耗耶宜除枳朴加陳皮六分再服一貼頓覺胸痞寛失氣除精神爽愷脉皆軟緩不大亦不駛矣可見脾胃虚者枳朴須散用為佐使况有參茋歸术為之君尚不能治然則醫之用藥可不慎哉一婦五十七嵗五月間因勞夜卧天熱開忩醒来遍身脹痛疑是沙症刮背起紫疙瘩因而胸膈脹痛磨木香服之致小腹作痛咳𠻳氣壅不能伏枕吐痰腥臭每次一二椀亦或作泄肛門脹急自汗不止身表浮腫醫作傷寒而用發散或作肺􅏴而用寒凉延綿一月醫皆辭去其子来告予予曰苐未知得何脉耳告曰醫謂脉洪數也予曰年逾五十血氣已衰又加以小勞而當酷熱之時又不免壯火食氣且脉洪數乃熱傷元氣而然非熱脉也所可慮者脉不為汗衰為泄減耳彼曰用生脉湯人參二錢門冬二錢五味一錢病似覺甚予曰邪重劑輕也理宜黄茋五錢以固表人參五錢以養内白术三錢茯苓錢半滲濕散腫陳皮七分吳茱萸四分消痰下氣再加甘草五分以和之門冬一錢以救肺依法煎服十餘貼後雖稍安脉與病反終不救一婦年逾三十形色脆白久病虚弱余為調治十餘載矣須不能純去泰去甚至嘉靖癸未便道復為診之左脉似有似無右脉浮濡無力予曰平素左脉不如此今忽殜深為之懼越三日再診兩手脉皆浮濡左則不似有似無右則畧近於駛而已乃知脉變不常昨今異狀者由虚而然也今醫以片時診察即謂其病若何遂解囊撮藥此亦失之疎略未必能盡其病情也近患頭眩眼昏四肢無力兩膝更弱或時氣上衝胸哽於喉中不得轉動則昏懵口禁不省人事内熱口渇鼻塞飲食減經水漸少予用人參三錢歸身白术麥門冬各一錢黄茋錢半黄栢七分枳實五分甘草四分煎服缺藥日久前病復作服之又安一人年逾三十質弱色蒼初覺右耳不時冷氣呵呵如箭出一陣越兩月餘左耳亦如右而氣出早晨聲啞胸前有塊攅熱飯後聲啞稍開攅熱少息頃間又覺攅熱或𠻳惡酸水小便頻赤大便溏泄睡熟被𠻳而醒噦惡二三聲胸腹作脹頭腦昏痛不堪或時發熱遍身疼痛天明前病少息惟攅熱不除近来午後背甚覺寒兩腿麻冷令用人參二錢半茯苓門冬白术各一錢黄連甘草枳實各五分貝母歸身各一錢白芍八分煎服而愈一婦蒼白不肥不瘦年逾五十病舌尖痛三年纔勞喉中熱痛或額前一掌痛早起頭暈飲食無味胸膈痞悶醫用消導清熱之藥不效予診右脉濡散無力而緩左脉比右頗勝亦近無力十五年前哭子忒甚遂作憂思傷脾哭泣傷氣從東垣勞倦傷脾之例用參茋各錢半白术芍藥天麻各一錢川芎𤣥參各七分甘草枳實各五分黄栢陳皮各六分煎服而愈楊梅瘡一人色蒼黄瘦年三十餘病遍身惡瘡因服輕粉而脚拘攣手指節腫額前神庭下腫如雞卵大方士令服孩兒骨其法取初生孩兒置磚地上周以炭火煏使死孩成灰紙裹放地上出火毒為末空心或酒或湯調服二三錢謂能補也邀予診視脉皆濡緩而弱予曰病已三年毒已盡矣但瘡潰膿血過多以致血液衰少筋失所養故脚為之拘攣况手指節間頭上額前皆血少運行難到之處故多滯而成腫理宜潤經益血行滯散腫今服孩骨猛火炮炙燥烈殊甚且向所服輕粉性亦燥烈丹溪曰血難成易虧今外被瘡膿所涸内被燥劑所熯以難成易虧之血曷能當此内外之耗乎不惟腫不能消殆必夀亦損也問曰本草輕粉辛冷何謂燥烈予曰本草註云硃砂伏火者大毒殺人水銀乃火煅硃砂而成其性滑動走而不守氣味俱陽從可知矣陽屬熱火故毒比硃砂為甚入耳蝕腦入肉百節拘攣也然輕粉又水銀和入皂礬再加火煅而成是為陽中之陽又復資以礬之燥烈非大毒燥烈而何又問此瘡從何而生予曰肝屬風而急暴腎屬水而主液為相火所寄淫夫淫婦擾動厥隂之火泄其腎水既無以制火之衝逆而反以為相火之助經曰火自水中起是也故腎之液皆被火欝成痰濁痰瘀血流注莖頭發為姦瘡久而毒熱不解復於兩腿厥隂經分又生惡瘡以其瘡狀類楊梅故俗名為楊梅瘡亦有如豌豆者由其毒有㣲甚也旬日之間延及遍體者以厥隂屬風而急暴又得相火以為之助宜其發之暴且速也初生之時體氣壯大便堅飲食進惟防風通聖散為最宜體氣弱大便溏飲食少則用四物加𤣥參連翹射干為主大便稍泄除射干上體多者黄芩或防風為佐下體多者黄栢或牛膝為佐引以皂角針之鋒鋭和以甘草節之甘緩却厚味絶房帷隨症出入服之久久無有不安或有惡湯藥者壯盛之人則以三補丸加大黄生地用猪膽汁丸服怯弱之人則以三補丸加𤣥參生地亦用猪膽汁丸服似亦簡便世人欲求速效皆用輕粉濕痰被刼三五日間瘡因暫愈然燥熱尚在不越一旬二旬瘡又復作翻思前藥又刼又愈愈又復發展轉不休殊不知用一次刼藥増一次燥熱由是肢體或􅏴潰或攣曲遂成痼癈論語欲速不逹厥有㫖哉又問何以能相染也予曰其人内則素有濕熱外則表虚凑疎或與同厠而為穢氣所蒸或與共床而為瘡汁所漬邪氣乘虚而入故亦染生此瘡經曰邪之所凑其氣必虚是也亦有同厠同床而不染者盖由内無濕熱之積外無表虚腠䟱之患是以邪不能入而瘡不相染矣雖然子之所慎齋戰疾然亦不可自恃而不加之意也又問已悮於藥悔不可追今將何藥以解之乎時正仲夏余用十全湯去桂附加紅花牛膝黄栢薏苡仁木香火麻仁羌活煎服百貼空心常服東坡四神丹加黄栢又少加蜀椒以其能来水銀然後脚伸能行指腫亦消惟額腫傅膏而愈一人患此瘡脚膝攣痛有人取蝦蟇治如食法令食之而攣痛遂愈此亦偶中也又一人患此瘡脚痛而腫或令採馬鞭草煎湯薰洗湯氣纔到便覺爽快候温洗之痛腫随減此草在處有之檻外空地尤多其葉類菊春開細碎紫花秋復再花抽穗如馬鞭故名馬鞭草又一人患此通身筋骨疼痛遇一道流問曰神色憔悴有病耶曰因瘡遍身痛也道流曰輕粉多矣吾亦被其毒矣遂示一方不過數味藥也但每貼入鉛五錢打扁同煎服之果驗凡患此瘡年久不愈者用萆薢二三兩為君随症虚實加入他藥㒺有不效盖萆薢善驅濕熱故也一人年三十餘因患此瘡服輕粉致右腹助下常有痞塊右眼黒珠時有丁子努出如雀屎許間或又消身有數瘡未痊一醫為治瘡毒而用硝黄一醫為治痞塊而用攻尅一醫為治眼丁而用寒凉諸症不減反加腹痛膓鳴大便􅉸泄胸膈壅悶不思飲食噯氣吐沫身熱倦怠夜卧不安季冬請余往視脉皆浮濡近駛曰誤於藥也前藥多係毒劑胃中何堪此物耶遂令棄去更用人參四錢黄茋二錢白术三錢茯苓炒芍藥各一錢陳皮神曲升麻各七分甘草肉荳䓻各五分煎服五貼為泄痛定減去升麻又服五貼膈寛食進減去荳䓻再服五貼諸症皆除月餘痞塊亦散眼丁亦消肺􅏴一婦年近三十形色瘦白素時或咳𠻳一二聲月水或前或後夏月取凉遂𠻳甚不能伏枕者月餘痰中或帶血或兼膿𠻳𦂳則吐食醫用芩連二陳不效復用參茋等補藥病重余視左脉浮􅉸右脉稍弱而􅉸幼傷手腕掌不能伸右脉似難慿矣乃以左脉驗之恐妊兼肺􅏴也遂以清肺泄肺之劑進之三服而能著枕痰不吐膿不咯惟時或惡阻予曰此妊之常病也教用薏苡仁白术茯苓麥門冬黄芩阿膠煎服病減月餘復為診脉皆稍緩而浮曰熱已減矣但吐紅太多未免傷胃教用四君子加陳皮黄芩枳壳煎服調理妊至六月食雞病作却雞而愈至九月病又復作聲啞令服童便獲安予曰産後病除乃是佳兆病若復来非吾所知月足而産脾胃病作加泄而卒脚瘡一婦瘦長靣紫每遇春末夏初兩脚生瘡膿泡根紅艱於行歩經水不調邀余診視脉皆濡弱近駛兩尺稍􅉸曰血熱也醫用燥劑居多故瘡不瘥合用東坡四神丹加黄栢宻丸服之瘡不復作􅏴腫邑庠司訓余先生年幾六十長瘦色蒼赴福建考試官回病背腿􅏴腫一腫愈一腫作小者如盞大者如鐘繼續不已俗曰流注是也醫皆欲用十宣散五香湯托裏散予為診之脉皆濡弱曰此非前藥所宜也夫以血氣既衰之年冐暑逺歩熱瘴之地勞傷形熱傷氣矣經云邪之所凑其氣必虚理宜滋補使氣運血行腫不作矣遂用大補湯減桂倍加參茋歸术佐以黄栢黄芩紅花服至二三十貼視腫稍軟者用砭决去其膿未成者果皆消釋仍服二三十貼以防後患一人肥短紫淡年逾三十因勞感濕兩腿胯間結核痛甚醫用蒜片艾灸又針大敦三隂交又以藥水洗之遂致隂囊腫脹如升莖皮腫如水泡復進人參敗毒散皆不中病邀余往診脉皆濡緩而弱略駛曰此濕氣乘虚而入欝而為熱成結核也理宜温中行濕可免後患月餘左腿内亷厥隂經分腫痛如椀惡寒發熱復用蒜灸六日後腫潰膿出體倦頭靣大汗手足麻木瘡下又腫如椀寒熱大作始信予言用人參三錢黄茋三錢白术錢半歸身尾牛膝茯苓各一錢青皮黄栢各七分甘草節五分煎服五六貼右額羊矢穴分腫痛長五寸許亦作寒熱醫謂補塞太過欲改前方彼言汪君已有先見所製之方必不悮我鋭意服之月餘腫皆膿潰成痂而愈惟左脚委中筋急短縮艱於行歩彼疑為躄遣書来示余曰膿血去多筋失所養故也藥力足日當不躄矣及果驗後覺隂囊腫縋他醫加茴香吳茱萸治疝等藥不效余適至彼令守前方減去治疝等藥加升麻一錢服一二貼囊即縮矣乃語予曰先生神醫也乃詳告吾病原乎予曰經云營氣不從逆於肉理乃生􅏴腫又云受如持虚盖謂氣餒行遲血少留滯則阻逆肉理乃作􅏴腫也久則欝而為熱化肉腐筋而成膿矣腫在厥隂雖曰多血亦難供給日之所耗夜之所損故邪乗虚留結不散如持虚器而受物也身之血氣如風與水風疾水急則頺陂潰隄莫有能禦之者也風息水細則砂障石壅多有所阻礙矣故今補其氣血使氣壯而行健血盛而流通又何腫之不散結之不行哉彼曰理也疝腫一兒八嵗􅒃疝隂囊腫脹核有大小予令燒荔枝核灰茴香炒為末等分食逺温酒調服二錢不過三服一兒六嵗隂囊脹大如盞莖皮光腫如泡一醫為之滲濕行氣不效邀予診視脉皆濡緩曰脉緩無力者氣虚也經云膀胱者津液之府氣化出焉氣虚不足無能運化而使之出矣宜升陽補氣可也遂以人參為君黄茋白术茯苓為臣牛膝升麻陳皮為佐甘草稍為使煎服一二貼囊皺腫消三貼全愈調經一婦瘦小年二十餘經水紫色或前或後臨行腹痛惡寒喜熱或時感寒腹亦作痛脉皆細濡近􅉸兩尺重按略洪而􅉸余曰血熱也或謂惡寒如此何得為熱曰此熱極似寒也遂用黄連酒煮四兩香附歸身尾各二兩五靈脂一兩為末粥丸空腹吞之病退一婦身瘦靣黄舊有白帶産後憂勞經水不止五十餘日間或帶下心前熱上身麻下身冷背心脹口鼻乾額角冷小便頻而多大便溏而少食則嘔吐素厭肉味遣書示病如此余曰雖未見脉詳其所示多屬脾胃不足令服四君子湯加黄芩陳皮神麯歸身二貼紅止白減復以書示曰藥其神乎繼服十餘貼諸症悉除一婦經行瀉三日然後行診其脉皆濡弱曰此脾虚也脾屬血屬濕經水將動脾血已先流注血海然後下流為經脾血既虧則虚而不能運行其濕故作參苓白术散每服二錢一日米飲調下二三次月餘經行不瀉矣一婦産後經行不止或紅或白或淡病逾八月靣色黄白性躁頭眩脚軟醫用參茋補藥病益加用止澁藥無效邀余診之右脉濡弱無力左脉畧洪而駛曰右脉弱者非病也左脉偏盛遂覺右脉弱耳宜主左脉治以凉血之劑遂以生地白芍白术各一錢黄芩阿膠歸身各八分陳皮香附川芎椿根皮茯苓各六分柴胡甘草各五分煎服二十餘貼而愈一婦形長質脆靣色黄白孀居十餘年平素食少内外俱勞年五十二嵗二月忽血崩若左手覺熱崩則又甚醫用苦寒黒灰凉血止血之劑益劇更用膠艾湯少愈偶因子病住藥月餘後服前湯崩則日少夜多七月盡来就余治右脉浮軟頗大左脉軟小而緩獨左尺尤近㣲弱余謂左脉主血得此與病相應右脉主氣今診得浮軟此乃脾胃氣不足也盖脾具坤静之徳而有乾健之運虚則不能健運其血矣胃氣者陽氣也陽主升舉虚則不能升舉其血矣經曰陽病竭而下者此也又曰陽病治隂隂病治陽正其血氣各守其鄉其治此病之謂歟今氣不能健運升舉以致血崩法當治陽世醫昧此但知血熱則行逢冷則凝逢寒則止故用苦寒黒灰之劑殊不知苦以瀉胃寒則降下故經曰苦傷氣寒傷血安能治其崩哉盖脾胃屬土惡濕喜温畏寒理宜甘温養其脾則熱自除氣自運而血随氣各歸其經矣東垣曰温能除大熱經曰形不足者温之以氣又曰氣生形又曰氣固形實形主血言又曰陽氣者精則養神柔則養筋故古人治血多用養氣豈無所本哉血逢黒則止但可以治標耳經曰胃者五藏之本苟不固本未免止而復發况其所病或勞或怒或惡食而崩愈甚此盖由脾胃不足不勝其勞怒也遂用參茋各四錢歸术各一錢甘草厚朴各五分炒蒲黄阿膠各七分煎服十餘貼崩則晝止夜来矣夜則隂旺陽衰陽不足以攝土故也再以棕皮五倍子蓮蓬燒灰加阿膠蒲黄粥丸臨晩服而夜亦止但清水常流大便燥結小便日無夜有又用潤麻丸加木通車前空心吞之然腰與小腹及脚腿皆痛胸膈不寛予適出月餘歸診脉皆沉細而數余曰數脉所主為熱其症為虚脉與向日不同而症反覺虚者多因久服前藥失於加減故藏府習熟而病反見化於藥矣令暫止藥乘轎歸家登山度嶺加以應接人事勞而又勞越三日血大崩約一桶許昏懵而氣息奄奄良久稍蘇是夜又崩二三碗許仍復昏懵余往視之脉仍沉細而數余曰五十以後血氣大脱實難求生但不忍坐視其斃耳乃用大劑參茋各七錢歸地姜附各一錢甘草五分煎服二三貼脉數略減頭痛昏弱腰脚腿痛亦愈日則胸膈似煩至夜亦愈但小腹時覺㣲痛清水常流不絶經曰衝脉者經脉之海主滲谿谷與陽明合於宗筋㑹於氣街而陽明為之長皆屬於帶脉故陽明虚則衝脉失養不能滲灌氣化為水而下流矣待其胃氣稍完則清者運而為津液濁者滲而為小便而水或可止也經曰壯者氣行則愈是矣若遇嚴寒又覺小腹腰脚腿痛者亦由陽虚不禦其寒故也天地稍和又不覺矣予曰病須少愈然血氣虚脱来春恐無以資生發之氣耳至春果洞㵼而沒丹溪曰氣病補血雖不中亦無所害血病補氣則血愈虚散是謂誅罸無過今病血病而治以參茋寧不犯丹溪之戒乎予曰學貴疎通不可執泥丹溪又曰衝任二脉為經脉之海二脉無損則血氣之行外循經絡内榮五藏若勞動過極損傷二脉則衝任氣虛不能約制其血故忽大下謂之崩中治宜舉養脾胃大補氣血丹溪治血何常不歸於氣虚而養脾胃也東垣亦曰血脱益氣古聖人之法也先理其胃以助生發之氣諸甘藥為之先務盖甘能生血此陽生隂長之理故先助胃氣且人之身納榖為寳予考聖經前賢所治血病未嘗専主於治血而不養氣要在臨病識宜耳雖然此固不免於死所以得遲延而無苦楚者恐亦由於藥力也因筆之幸同志者考其得失一婦年逾四十形長色脆病經不調右脉浮軟而大左脉虚軟而小近駛嘗時經前作泄今年四月感風咳𠻳用湯洗浴汗多因泄一月六月復因洗浴發瘧六七次瘧雖止而神思不爽至八月盡而經水過多白帶時下瀉泄遂覺右脚疼痛舊曽閃肭脚跟今則假此延痛臀腿腰脇尾骨脛項右邊筋皆掣痛或咳𠻳一聲則腰眼痛如刀扎日輕夜重呌號不已幸痛稍止飲食如常今詳月水過多白帶時下日輕夜重瀉泄無時亦屬下多亡隂宜作血虚論治然服四物止痛之劑益甚九月予復診視始悟此病乃合仲景所謂陽生則隂長之法矣夫經水多白帶下常瀉泄皆陽虚䧟下而然命曰陽脱是也日輕夜重盖日陽旺而得健運之職故血亦無凝滯之患而日故輕也夜則隂旺而陽不得其任失其健運之常血亦随滯故夜重也遂以參术助陽之藥煎服五七貼痛減此亦病症之變治法殊常故記之一婦年二十一歳六月經行腹痛如刮難忍求死脉得細軟而駛尺則沉弱而近駛余曰細軟屬濕數則為熱尺沉屬欝此濕熱欝滯也以酒煮黄連半斤炒香附六兩五靈脂半炒半生三兩歸身尾二兩為末粥丸空心湯下三四錢服至五六料越九年得一子又越四年經行兩月不斷腹中㣲痛又服前丸而愈續後經行六七日經止則流清水腹中㣲痛又服前丸而痛亦止又經住只有七八日若至行時或大行五六日續則適来適斷或㣲紅或淡紅紅後嘗流清水小腹大痛漸連遍身胸背腰腿骨裡皆痛自己至酉乃止痛則遍身冷熱汗大出汗止痛減尚能飲食自始痛至今厯十五年前藥屢服屢效今罔效者何也余在休寧率口其母伴女荷轎至彼就醫脉皆洪滑無力幸其尚有精神余曰此非舊日比矣舊乃欝熱今則虚寒東垣曰始為熱中終為寒中是也經曰脉至而從按之不鼓乃隂盛格陽當作寒治且始病時而形歛小今則形肥大矣醫書曰瘦人血熱肥人氣虚豈可同一治耶所可慮者汗大泄而脉不為汗衰血大崩而脉不為血減耳其痛日重夜輕知由陽虚不能健運故亦凝滯而作痛以症㕘脉宜用助陽若得脉減痛輕方為佳兆遂投參茋歸术大劑加桂附一貼来早再診脉皆稍寧随即回宅服至二三十貼時當二月至五月予適往城視之病且愈矣盖病有始終寒熱之異藥有前後用舍不同形有少壯肥瘦不等豈可以一方而通治哉後聞乳有隠核數枚彼時失告於余訪之外科歸罪於多服參茋而然殊不知肥人氣虚多滯若能久服前藥不惟乳無隠核縱有亦當消矣多因病退却藥血氣未充故氣滯血凝而成此核經曰壯者氣行則愈是矣予以書喻祇恐一齊傅衆楚咻莫能回其惑也一婦每臨經時腰腹脹痛玉户淫淫蟲出如䑕粘子狀緑色者數十枚後經水随至其夫問故予曰厥隂風木生蟲婦人血海屬於厥隂此必風木自甚兼脾胃濕熱而然也正如春夏之交木甚濕熱之時而生諸蟲是也宜清厥隂濕熱邪令以酒煮黄連為君白术香附為臣研末粥丸空腹吞之月餘經至無蟲而妊矣一婦形質瘦小靣色近紫産後年餘經水不通首夏忽病嘔吐手指麻痺攣拳不能伸展聲音啞小噦不出聲醫皆視為風病危之予診脉皆細㣲近滑曰此妊娠惡阻病也衆謂經水不通安有妊娠予謂天下之事有常有變此乃事之變也脉雖細㣲似近於滑又尺按不絶乃妊娠也遂以四君子加二陳治之諸症俱減尚畏粥湯惟食乾糕香燥之物而有生意出部脉一婦年逾四十形色頗實常患産難倒生經水不調或時遍身骨節疼痛食少倦怠自汗予為診之兩手脉皆不應惟右闗輕按隠𨼆然㣲覺動也疑脉出部以指尋按經渠列缺穴分亦不應余甚怪之乃叩其夫曰有孕時醫診亦言無脉後服八物湯幸爾易産而得一子余曰此由禀賦本来脉不應也無足怪焉可見天下事變出無窮果難一一以常理測也如脉經所謂但道其常而已兩手無脉不傷其生又不妨於胎妊豈脉經所能論及耶脉或兩手出部或一手出部余見多矣兩手無脉而人如故此亦理之所無事之大變故筆記一婦有病請余診之右脉緩濡而弱左手無脉再再尋之動於腕臂外亷陽谿偏厯之分乃語之曰左脉離其部位其病難以脉知以右脉言之似屬於脾胃不足也尚當言其病焉告曰每遇經未行前咯血數口心嘈不安食少懶倦余以四君子湯加山枝陳皮麥門冬牡丹皮煎服數貼而安余嘗考孫兆診一釋者左脉出部動於臂上曰此怪脉也醫書不載脉行常道豈有移易或者少年驚撲震動心神故脉脱故道耳年既長大血氣已定不能復移也僧曰果如所言余詢此婦未嘗得驚而脉如是可見亦由於禀賦也後在歙之江村診得兩手脉俱出部者數人或左或右一手脉出部者尚多信行診一婦人兩手脉亦出部凡此皆事變無窮理之莫測豈皆由於驚動哉夫此雖非經水之病因其脉類前案故録於此妊病一婦懐妊八月嘗病腰痛不能轉側大便燥結醫用人參等補劑痛益加用硝黄通利之藥燥結雖行而痛如故予為診之脉稍洪近駛曰血熱血滯也宜用四物加木香乳沒黄栢火麻仁煎服四五貼痛稍減燥結潤復加發熱靣赤或時惡寒仍用前方去乳沒黄栢加柴胡黄芩服二貼而寒熱除又背心覺寒腰痛復作予曰血已利矣可於前方加人參一錢服之獲安一婦嘗患横生逆産七八胎矣子皆不育予診脉皆細濡頗弦曰此氣血兩虚兼熱也或曰氣血有餘方成妊娠氣血既虧安能胎耶予曰觀其形長瘦而脉細濡屬於氣血兩虚色青脉弦屬於肝火時熾而兩尺浮滑似血虚為輕而氣虚為重也宜以補隂丸除陳皮倍加香附參茋􅁡丸服之常令接續踰年臨産果順而育一子産後一婦産後滑㵼勺水粒米弗得容即時泄下如此半月餘矣衆皆危之或用五苓散平胃散病益甚邀余診之脉皆濡緩而弱曰此産中勞力以傷其胃也若用湯藥愈滋胃濕非所宜也令以參苓白术散除砂仁加陳皮肉荳䓻煎薑棗湯調服旬餘而安一婦産後時發昏瞀身熱汗多眩暈口渇或時頭痛惡心醫用四物凉血之劑病不減復用小柴胡病益甚予為診之脉皆浮洪摶指予謂産後而得是脉又且汗多而脉不為汗衰法在不治所幸者氣不喘不作泄耳其脉如是恐為凉藥所激也試用人參三錢黄茋二錢甘草當歸各七分白术門冬各一錢乾姜陳皮黄芩各五分煎服五貼脉歛而病漸安小兒驚癎一女年六嵗病左手不能舉動三年矣後復病癎初用人參半夏或效或否予診左脉浮洪右脉頗和曰痰熱也令以帛勒肚取茶子去壳三錢挼碎以滚湯一碗濾取汁隔宿勿食早晨温服吐痰如大蒜瓣者三椀許手能舉動癎亦不作余孫應逹初生未滿一月乳媪抱之懐間往觀春戯時風寒甚切及回即啼不乳時發驚搐始用蘇合香繼用驚搐藥不效衆皆危之予曰小兒初生血氣未足風寒易襲此必風邪乘虚而入也風喜傷脾脾主四肢脾受風擾故四肢發搐日夜啼呌不乳經曰風淫末疾是也其治在脾脾土不虚則風邪無容留矣因煎獨參湯初灌二三匙啼聲稍緩再灌三五匙驚搐稍定再灌半酒盃則吮乳漸有生意泄㵼一孩孟秋泄瀉晝夜十數度醫用五苓散香薷飲胃苓湯加􅀢豆䓻罔有效者予曰此兒形色嬌嫩外邪易入且精神怠倦明是胃氣不足而為暑熱所中胃虚挟暑安能分别水榖今専治暑而不補胃則胃愈虚邪亦著而不出經曰壯者氣行則愈怯者著而成病是也令濃煎人參湯飲之初服三四匙精神稍回再服半酒盃㵼泄稍減由是節次服之則乳進而病脱石山醫案卷中
