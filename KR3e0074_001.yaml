body:
  text: 石山醫案卷上明陳桷撰榮衛論丹溪論陽有餘隂不足乃據理論人之禀賦也盖天之日為陽月為隂人禀日之陽為身之陽而日不虧禀月之隂為身之隂而月常缺可見人身氣常有餘血常不足矣故女人必須積養十四五年血方足而經行僅及三十餘年血便衰而經斷隂之不足固可驗矣丹溪揭出而特論之無非戒人保守隂氣不可妄耗損也以人生天地間營營於物役役於事未免久行傷筋久立傷骨久坐傷腎久視傷神久思傷意凡此數傷皆傷隂也以難成易虧之隂而日犯此數傷欲其不夭札也難矣此丹溪所以立論垂戒於後也非論治隂虛之病也若遇有病氣虛則補氣血虛則補血未嘗專主隂虛而論治且如産後的屬隂虛丹溪則曰右脉不足補氣藥多於補血藥左脉不足補血藥多於補氣藥丹溪固不專主於血矣何世人昧此多以隂常不足之說横於胷中凡百諸病一切主於隂虛而於甘温助陽之藥一毫不敢輕用豈理也哉雖然丹溪謂氣病補血雖不中亦無害也血病補氣則血愈虛散是謂誅罸無過此指辛熱燥烈之劑而言亦將以戒人用藥寧可失於不及不可失於太過蓋血藥屬隂而柔氣藥屬陽而剛苟或認病不眞寧可藥用柔和不可過於剛烈也書曰罪疑惟輕功疑惟重本草曰與其毒也寧善與其多也寧少之意正相合也雖然血虛補氣固為有害氣虛補血亦不可謂無害吾見陽虛氣弱不能運行血越上竅者多用四物湯凉血之藥反致胸腹痞悶飲食少進上吐下㵼氣喘嘔血去死不逺豈可謂無害耶是以醫者貴乎識病眞耳或又曰人禀天之陽為身之陽則陽常有餘無待於補何方書尚有補陽之說予曰陽有餘者指衛氣也衛氣固無待於補而營之氣亦謂之陽此氣或虛或盈虛而不補則氣愈虛怯矣經曰怯者著而成病是也况人於日用之間不免勞則氣耗悲則氣消恐則氣下怒則氣上思則氣結喜則氣緩凡此數傷皆傷氣也以有涯之氣而日犯此數傷欲其不虛難矣虛而不補氣何由行或問丹溪曰人身之虛皆隂虛也若果陽虛則暴絶死矣是陽無益於補也又曰氣無補法世俗之言也氣虛不補何由而行是氣又待於補也何言之背戾耶予曰經云衛氣者水谷之悍氣也慓疾不受諸邪此則陽常有餘無益於補者也朱子曰天之陽氣健行不息故閣得地在中間一息或停地即䧟矣與丹溪所謂陽虛則暴絶同一意也此固然矣使隂氣若虛則陽亦無所依附而飛越矣故曰天依形地附氣丹溪曰隂先虛而陽暴絶是知陽亦頼隂而有所依附也此丹溪所以拳拳於補隂也經曰營氣者水谷之精氣入於脉内與息數呼吸應此即所謂隂氣不能無盈虛也不能不待於補也分而言之衛氣為陽營氣為隂合而言之營隂而不禀衛之陽莫能營晝夜利關節矣古人於營字下加一氣字可見衛固陽也營亦陽也故曰血之與氣異名而同類補陽者補營之陽補隂者補營之隂又况各經分受有氣多血少者有血多氣少者倘或為邪所中而無損益則藏府不平矣此内經所以作而醫道所以興也譬如天之日月皆在大氣之中分而言之日為陽月為隂合而言之月雖隂而不禀日之陽則不能光照而運行矣故古人於隂字下加一氣字可見陽固此氣隂亦此氣也故曰隂中有陽陽中有隂隂陽同一氣也周子曰隂陽一太極是也然此氣有虧有盈如月有圓有缺也聖人裁成輔相即醫家用藥損益之義也是知人參黄茋補氣亦補營之氣補營之氣即補營也補營即補隂也可見人身之虛皆隂虛也經曰隂不足者補之以味參茋味甘甘能生血非補隂而何又曰陽不足者温之以氣參茋氣温又能補陽故仲景曰氣虛血弱以人參補之可見參茋不惟補陽而亦補隂東垣曰血脫益氣仲景曰陽生隂長義本諸此世謂參茋補陽不補隂特未之考耳予謂天之陽氣包括宇宙之外即易所謂天行健内經所謂大氣舉之者是也此氣如何得虛虛則不能畜住地矣天之隂聚而成形形者乃地之坤也故曰天依形地附氣可見人身之衛即天之乾人身之形即地之坤營運於藏腑之内者營氣也即天地中發生之氣也故以氣質言衛氣為陽形質為隂以内外言衛氣䕶衛於外為陽營氣營養於内為隂細而分之營中亦自有隂陽焉所謂一隂一陽互為其根者是也若執以營為衛配而以營為純隂則孤隂不長安得營養於藏府耶經曰營為血而血即水朱子曰水質隂而性本陽可見營非純隂矣况氣者水之母且天地間物有質者不能無虧盈既有質而虧盈血中之氣亦不免於虧盈矣故丹溪以補隂為主固為補營東垣以補氣為主亦補營也以營兼血氣而然也答提學黄公如金所患書生樸􅈪小材山林迂士其於岐黄之書盧扁之術僅惟得其糠粃而已升堂入室誠有所未能也兹䝉召置左右以偹顧問夙夜祇懼惟恐弗堪雖然一得之愚不敢不盡是以忘其固陋謹述以聞古人所謂芻蕘之言狂夫之語庶幾或有可采者也伏惟天寛地容海涵春育人不求備才不求全片言有取寸長必録又且不作聰明不大聲色靡恃其長毋執其見舍己從人不知有彼此之别使各得以紓其情也用上敬下相忘於勢利之場俾皆得以盡其辭也是知所言或謬殆必視如道傍苦李唾而去之而已必不索我於形骸之外以言而見責焉然生侍側有日聆誨已久因而察其受病之源詳其致病之因不過心過於勞而已何則心為血主而血又所以養心血屬隂而主靜惟靜則可以生水故曰靜則生隂是也苟或心過於勞則主動而屬陽矣陽則火之象也故曰動則生陽丹溪亦曰諸動屬火動極火熾陽亢隂微血愈虧損而心失所養矣是以睡卧不寧夜夢紛紜職皆由於此也經云主閉蔵者腎也腎主相火上係於心心既動勞則相火隨起而熱則流通矣是以閉蔵之腎反暗流踈㵼而夢遺精滑之疾有所不能免矣醫書所謂情動於中精淫於外是也經云東方實西方虛心勞火動則西方之金愈虛而東方之木愈實脾土得不為之傷乎脾土既傷是以上或為嘔下或為㵼中或畏食之病莫不層出而疊見矣由是探本索元其初固在於心而支流餘裔不免延及他蔵而亦有所損也又嘗參之以脉夫左寸心脉所出也或時而浮洪或時而歛小蓋由心之勞逸不常以致脉之大小無定勞則心動而火熾故脉為之浮洪而躁擾逸則心安而氣和故脉為之歛小而恬靜所可喜者肝腎二部脉靜而有常乆而不變是知相火雖或有時而動而勢未至於燎原也故今病未即瘳而終有可瘳之理邪未即伏而終有可伏之機尚復何慮之有右手三部肺脾命脉之所出也亦或浮而稍洪又或小而稍弱良由火来侮肺又乘於脾遂延及命門以致然耳故曰火性躁擾强越其燔灼之禍無不著於物也或時小而稍弱者蓋府蔵之隂血陽氣未免為火暗傷而隂損故火旺之時脉来浮洪而獨見火象及火靜之後則邪伏而虛見矣脉之小而弱者寧不基於此乎或曰血為火銷吾固聞其說矣而氣當頼之以為助何謂亦傷其陽乎經曰少火生氣壯火食氣夫少火固可以生氣而壯火火之旺甚也安得不食其氣而損之乎又曰熱傷氣故暑月多致人無氣以動怠惰嗜卧可見火之傷氣不待辨而明矣又何疑之有哉生於是察其脉切其病反復精思參互考証其所治之方無出於八物湯之外也或者專主四物滋隂加黄栢知母𤣥參生地之屬以降火此固一說也未免寒傷胃氣而嘔㵼畏食之病莫能去矣或者專主四君子以養陽加温煖消導燥熱之劑以助胃此亦一理也未免陽剛傷隂而夜夢遺精之患不能除矣求其萬舉萬全而無一徧之害者還當以八物為主一則可以養隂而心火不至於太熾一則可以養陽而脾土不至於太傷其他清金降火安神固腎之藥又當因其時月之宜酌其病之輕重更相出入遞為佐使庶得變通之妙而免執中無權之誚矣守此以治而謂病之不痊吾未之信也抑猶有說焉夫人生氣交之中孰能無欲所謂欲者非特色欲之欲凡耳之於聲目之於色鼻之於臭口之於味皆所謂欲也周子曰欲動則情熾熾從火則火之熾可知矣丹溪所謂諸動屬火其原蓋出於此歟故聖賢教人不欲窒欲則曰寡欲此善治乎火也不此是務而惟日以百憂感其心萬事勞其形惟恃刀圭之劑以求旦夕之功是謂舎本而逐末狥外以遺内也豈自根自本之論哉今之所患誠能内觀以養神存心以養性則水可升火可降坎離交而地天泰矣又何待於籠中物耶且胃氣者清純冲和之氣也凡藥之氣皆偏非若五穀可常食也苟不知此而惟藥之是躭則胃氣之存者幾希矣有志養生者不可以不謹生既以症治之方而詳之於前復以存養之要而申之於後無非致其叮嚀忠愛之意也伏乞髙明議之以訂是否條答福建舉人謝邦實所患書一所示大便多燥而色赤竊意燥赤亦熱所為大便燥赤固熱所為亦挾血虛蓋大腸屬陽明燥金血旺則便潤血少則便燥且腎主大便而亦屬血也由此論之則血虛兼熱為兩盡矣一所示夜卧少寧舌生黒胎唇口焦燥靜養服藥二三日胎始退不知降火去胎之藥更有何方法唇舌焦乾更何調理此項數病皆生於心何則心主血脉心血一虧則陽熱隨起故夜卧不寧唇舌焦燥黒胎之病層出而疊見矣且舌乃心之苖心火亢極故舌生黒胎靜養二三日而始退者蓋靜養則隂生隂生則陽伏矣周子所以定之以中正仁義而主靜者良以此也降火去胎潤唇滋燥之藥恐無出於四物再加麥門冬五味黄栢知母之屬一所示目力亦短五歩之内於人多不能識直視天日惟濛濛紛紛白花矣白精血縷不斷睡醒反漬淚東垣云能逺視不能近視氣有餘血不足也能近視不能逺視血有餘氣不足也今貴目既不能視逺又不能視近此氣血俱不足也直視天日惟見白花白花乃肺之象何則肺為氣主屬金而燥肺金一虛火来易侮且天與日皆陽火也虛金受侮於天日之陽火故白花紛紛散漫而見於前矣白精血縷不斷睡醒反漬淚者屬於肝火之動也經云肝熱甚則出淚是矣所治之方要當滋腎水以制火保肺氣以畏木則眼中諸疾雖不期愈而自愈矣然加减補隂丸正與病對先生宜詳審之一所示腎覺衰甚不敢勞動惟有患則腰足痠痛或右腎痠疼或久立或勞皆然意區區氣病居多故所患右體偏多見鬚白眼赤多自右為甚夫人之一身氣血周流細而分之則氣屬於右血屬於左氣屬於右則右體不免氣旺而血劣也且先生亦中年已後血氣日减加之右體氣旺血劣宜乎腰足痠疼右腎時痛鬚白眼赤之症多見於右也補腎藥方亦無出於加减補隂丸藥生當别楮以呈一所示勞倦時小便旁射散逆如絲不得順直意皆氣之不足藥之不專勞而失養然歟此條先生以為氣之不足藥之不專勞而失養之所致以予觀之誠不出此三之外但先生徒托諸空言不見諸行事是以病根不除時作而時止矣一所示近来腰復微痛坐久屈伸不便右側腰腿相接處曰環跳穴旁多酸痛夫腰者腎之外候蓋由腎水衰虛於内以致腎之外候或微痛或屈伸不便或環跳穴旁酸痛也環跳雖屬膀胱膀胱亦腎之府未有藏病而府不病也一示孤骨下間有火熱或升於右脚股一團三指許有時微熱如燈照丹溪有曰火自湧泉穴起者乃火起自九泉也孤骨須亦屬於膀胱與腎相為表裏而又近於湧泉即此觀之是亦腎水衰少不足以制火而火起於九泉之類也此宜滋養腎水以制妄火經云滋隂水以制陽光是也疫一人年弱時房勞後忽洒洒惡寒自汗發熱頭闕胃脘皆痛唇赤舌强􅀈吐眼胞青色醫投補中益氣午後譫語惡熱小便長初日脉皆細弱而數次日脉則浮弦而數醫以手按臍下痛誼欲下之遣書来問予曰疫也疫兼兩感内傷重外感輕耳臍下痛者腎水虧也若用利藥是殺之也古人云疫有補有降有散兹宜合補降二法以治别清暑益氣湯除蒼术澤㵼五味加生地黄芩石膏服十餘貼即安瘧邑人汪大尹年幾七十形色蒼白勞倦病瘧瘧止胸膈痞悶心惡痰多不思飲食懶倦口苦頭痛夜夢紛紜兩腿時癢予為診之脉皆浮濡無力且過於緩醫書云脉緩無力者氣虛也又云勞則氣耗又云勞倦傷脾脾傷不能運化精微以養其心故心神為之不安宜倣歸脾湯例治之人參二錢麥門冬白术各一錢歸身酸棗仁茯神各八分黄芩陳皮各六分枳實甘草各五分川芎七分煎服二貼夜卧頗安但藥後覺嘈食則吞酸口淡減去枳實加山查七分吳茱萸二分服之仍用參术歸芎山枝山查丸服而愈一人年逾四十形瘦色紫淡素勞傷脾予令常服參苓白术散獲安住藥一年復勞飲冷酒不爽是夜頭又被濕遂致身冷不安早起面目俱黄醫用零筋草根酒煎服之吐㵼大作又加姜煎則心熱膈壅不進飲食大便秘結瘧作胸膈痞塞粥飲不入食此湯則噯此氣􅀈逆吐涎意向甚惡予診左脉浮濡無力肝脉頗弦右脉肺部濡散脾部浮微二部脉皆似有似無或呼攻相引又覺應指曰此脾虛之極也初因勞熱飲冷頭又被濕内熱因欝故發為黄若用搐藥以泄上焦濕熱則黄自退乃用草藥酒煎濕熱雖行而脾氣存也幾希且勿治瘧當用補脾為急用人參五錢橘紅一錢時時煎湯呷之令其且莫食粥以囬胃氣彼如所言旬餘乃愈一人年逾四十不肥不瘦形色蒼白季秋久瘧醫用丹劑一丸止之嘔吐不休粒米不入大便或㵼面赤妄語身熱予診脉皆浮而欲絶仲景云陽病得隂脉者死今面赤身熱妄語其症屬陽而脉微欲絶則隂脉矣此一危也經曰得穀者昌失榖者亡今粒米不入此二危也又曰泄而熱不去者死今數泄㵼而面赤身熱不除此三危也以理論之法在不治古人云治而不愈者有也未有不治而愈者也令用人參五錢白术二錢御米一錢橘紅八分煎服四貼漸有生意一人年近三十形瘦淡紫八月間病瘧予診之左脉頗和而駛右脉弱而無力令用清暑益氣湯加减服之覺胸膈痞悶遂畏人參更醫作瘧治而瘧或進或退服截藥病稍增延至十月復邀予診脉皆浮小而濡帶數右則尤近不足曰正氣乆虛邪留不出瘧尚不止也宜用十全大補湯减桂加芩倍參服之漸愈一人年逾三十形瘦色蒼八月間病瘧或用截藥或用符水延纏不愈胸膈痞滿飲食少進大腸痔血小便短赤瘧發於夜寒少熱多自汗予診左脉濡小而緩右脉濡弱無力曰此乆瘧傷脾也用人參二錢白术歸身茯苓各一錢芍藥八分黄芩七分枳實五分陳皮六分甘草四分煎服後因痔血未止吞槐角丸而血愈多仍服前方而血减矣一婦面色淡紫年逾四十九月病瘧夜發渴多汗嘔吐粒食不進數日予診脉皆浮濡而緩按之無力遂用人參五錢橘紅八分甘草七分白术一錢煎服十餘貼瘧止食進漸有生意但大便二十日不通再診右脉浮小無力左脉沉弱無力前方加歸身一錢火麻仁錢半如舊煎服病除一婦年逾三十瘦長淡紫六月産八月瘧瘧止胸膈痞悶纔勞氣喘咳血身熱脚冷予診左脉濡弱右脉肺部頗洪關尺二部亦弱以生地黄白芍麥門冬白术各一錢阿膠歸身牡丹皮各七分人參八分陳皮五分煎服一貼再令熱服㵼止膈快但盗汗而脚即軟矣前方加黄茋錢半黄栢七分依前煎服而安一人年三十形色蒼白因勞感熱九月盡病瘧頭痛口渴嘔吐胸膈痞塞不進飲食自汗倦怠熱多寒少醫用截藥病增過飲水吐甚予診脉皆浮大而濡頗弦曰此勞倦傷脾熱傷氣之瘧也令用人參三錢黄茋錢半白术麥門冬各一錢枳實五分山查七分歸身黄栢知母各七分乾姜甘草各三分煎服三貼病减復勞病作前方人參加作四錢服之向安一人年三十乆瘧醫用補中益氣湯或止或作延及半年因解髪結勞傷咳𠻳醫以前方加半夏五味遂致喉痛聲啞夜不能寝邀予視之右脉浮濡左脉小弱曰經云隂火之動發為喉痺是也此必色欲不謹乆服參茋徒增肺中伏火耳令以甘桔湯加䑕粘子蜜炙黄栢煎服二貼喉痛除而聲出繼服保和湯五貼而安一人年三十餘形瘦淡紫素勞乆瘧三日一發於夜嘔吐熱多寒少不進飲食小便頻數氣喘咳𠻳日夜打坐不能伏枕幾月矣頭身骨節皆痛醫作瘧治病甚衆皆危之脉皆浮虛緩弱而不甚大予以參术加陳皮黄栢枳實知母麥門冬北五味煎服三貼病退越二日復病令用四物加童便服之則𠻳除喘止始能就卧再用八物湯除茯苓加枳實香附又用枳术丸加人參砂仁歸身黄芩吞服調理熱来常服童便半年而安一婦形色脆白年五十餘憂勞六月背瘡艾灸百餘壯瘡散病瘧身熱自汗口渴頭暈嘔吐泄㵼不進飲食寒少熱多自用清暑益氣湯病甚予診左脉浮微似有似無右脉浮小按之不足曰病雖屬瘧當作虛治依方而用清暑益氣固與病宜但邪重劑輕病不去耳令以參术加作五錢茋三錢茯苓一錢陳皮七分甘草五分煎服病退一人於嘉靖九年因冐風病瘧熱多寒少頭痛倦怠食少自汗已服參蘇飲一貼予適在彼診之脉皆浮虛近駛曰此虛瘧也非參蘇飲所宜令將平日所服參茋歸术等藥煎服五六貼而愈且諭之曰元氣素虛不宜發散凡遇一切外感必須以補元氣為主少加發散之藥以輔佐之庶為允當宜永識之一婦常患咳𠻳加以瘧疾因仍左脇有塊瘧止有孕𠻳尚不寧喉乾痰少或時嘔出頑痰鐘許方止夜亦如是常覺熱盛胸膈壅滿背心亦脹常要打摩妊已六月夜半如厠身忽寒戰厚覆少頃乃愈越兩日夜半又發寒熱如瘧肢節痛上身微汗口中覺吐冷氣胸喉如有物礙心前虛腫按之即痛頭痛氣喘坐卧不寧醫作傷寒發散又作痰症而用二陳不效予往視之脉皆濡而近滑曰胃虛血熱也先以四君子湯加黄芩枳壳麥門冬煎服二三貼以保胃氣繼以四物湯加梹榔枳壳麻仁大黄三服下之遂滯下後重虛坐努責怠倦不食時或昏悶亂呌食則脹不食饑四肢痛脚腫予曰胃虛非湯藥所宜令合枳术凡加人參當歸黄芩服月餘諸症悉除胎亦無損一人形瘦色脆年幾三十正德十年四月腹痛惟覺氣轉左邊五日而止次年四月亦然八月病瘧間日一發寒少熱多十餘日止第三年四月八月如舊腹痛瘧作四年五年四月八月亦然但瘧作腹痛瘧止痛止旬餘瘧除又㵼痢十餘日㵼止瘧又作但不腹痛五日瘧瘥仲冬感寒頭痛發熱腹及右脇脹痛氣喘溏㵼内黑外紅日夜五六次内熱不减飲食難進醫用三乙承氣湯二貼繼用木香枳术丸諸症稍定午後内熱愈熾遇食愈脹得㵼畧寛頭痛不减詣予診治脉皆浮濡近駛曰氣屬陽當升虛則下䧟矣又屢服消尅攻下之劑所謂虛其虛也安得不脹而頻㵼乎經云下者舉之其治此病之謂歟或曰脹滿者氣有餘也積塊者氣固結也經云結者散之有餘者損之今有餘而補固結而益何謂予曰人身之氣猶天之風風性剛勁揚沙走石孰能禦之孟子曰至大至剛是也餒則為物障蔽反以為病若能補養以復其剛大之性則衝突排蕩又何脹滿不散積塊不行經曰壯者氣行則愈怯者著而成病是也蓋氣之强壯者則流動充滿或有積滯亦被衝突而行散矣何病之有氣之怯弱則力小遲鈍一有積滯不免因仍承襲積著成病故此病法當升陽益胃遂以參苓白术散煎升麻湯調服月餘仍令丸服一料而愈一人形瘦色脆年三十餘八月因勞病瘧寒少熱多自汗體倦頭痛胸痞畧欬而渴惡食大便或秘或溏發於寅申巳亥夜醫誼欲從丹溪用血藥引出陽分之例治之予診其脉濡弱近駛稍弦曰察形觀色參脉乃屬氣血兩虛瘧已深入厥隂矣專用血藥不免損胃又損肺也淹延歲月乆瘧成癆何也自汗𠻳渴而蒼术白芷豈宜例用惡食胸痞而血藥豈能獨理古人用藥立例指引迷途耳因例達變在後人推廣之也遂以補中益氣湯加川芎黄栢枳實神麯麥門冬倍用參茋术煎服三十餘貼諸症稍除瘧猶未止乃語之曰今當冬氣沉潛瘧氣亦因之以沉潛難使浮達况汗孔亦因以閉塞經曰瘧以汗解當此閉藏之時安得違天時以汗之乎且以參术枳實陳皮歸身黄芩丸服胃氣既壯来年二月瘧當隨其春氣而發泄矣果如期而安一人年三十形色頗實初因舟行過勞受熱咳嗽不已續又病瘧素有熱淋求醫服藥或作或輟囬家予為診之脉皆濡弱近緩左尺畧駛曰此熱傷氣也肺為氣主氣傷肺亦傷矣故發咳嗽其瘧亦因熱而作令用人參錢半白术麥門冬茯苓各一錢歸身知母各七分青皮黄栢甘草各五分煎服而安九月復舟行過勞感熱其瘧復作或一日一發或二日一發或三日一發或連發二日囬家醫作瘧治不效仍用前方煎服遂安一人年三十六月因勞取凉夢遺遂覺惡寒連日慘慘不爽三日後頭痛躁悶家人診之驚曰脉絶矣議作隂症欲進附子湯未决邀予往治曰隂症無頭疼今病如是恐風暑乘虚入於隂分故脉伏耳非脉絶也若進附子湯是以火濟火安能復生姑待以觀其變然後議藥次日未末申初果病寒少熱多頭痛躁渴痞悶嘔食自汗大便或㵼或結脉皆濡小而駛脾部兼弦此非尋常驅瘧燥烈刼劑所能治遂用清暑益氣湯减蒼术升麻加柴胡知母厚朴川芎以人參加作二錢黄茋錢半白术當歸各一錢煎服二十餘貼而愈本縣二尹大人北人形長魁偉年逾四十六月舟中受熱病瘧寒少熱多頭疼躁渴汗多醫用七保飲治之不愈予診其脉浮濡而駛畧弦曰此暑瘧也以白虎湯加人參三錢煎服十餘貼而瘧止侍御程公形色清脆年餘四十素善飲形色蒼熱病頭痛惡食泄㵼小便短少午後惡寒發熱醫用二陳平胃五苓共一服治不退反增腰腹拘急邀予診視脉皆濡弱頗弦而駛曰耗血傷胃惟酒為甚復加以時熱外傷其氣内外兩傷法當從補若用草菓梹榔常山半夏燥烈之劑譬猶抱薪救火寧不益其病耶遂以人參二錢黄茋錢半以益皮毛不令汗泄白术茯苓石膏麥門冬各一錢以導濕熱不使傷胃知母青皮神麯黄芩歸身川芎柴胡各七分以消積滯而和表裏少加甘草三分煎服十餘貼瘧止後以參苓闕散常服收功一人年三十餘八月因勞病瘧詣予診治脉皆六至而數無力曰古人云形瘦色黒者氣實血虛也又云脉數無力者血虛也間日發於午後亦血分病也以色脉論之當從血治但今汗多乃陽虛表失所養消穀善饑乃胃虛火乘其土皆陽虛也仲景法有憑症不憑脉者兹當憑症作陽虛治以參茋各三錢白术白芍麥門冬各一錢歸身生地甘草各七分黄栢知母陳皮各五分煎服二十餘貼而安若用尋常驅瘧刼劑寧免後艱予年逾六十形質近弱八九月酷熱時往来休歙外有藥劑之功内有病者之憂内外弗寧晝夜不静至十月初旬瘧作三日午後一發寒不甚寒熱不甚熱喜熱惡寒寒去熱来則爽快矣口乾微渴臨發昏倦嗜卧左脉沉小而數右脉浮濡無力亦近於數獨脾部弦而頗洪瘧去則脉皆大小浮沉相等惟覺緩弱而矣初服補中益氣湯十餘貼病無加减夜苦盗汗繼服當歸六黄湯黄茋每貼四錢五貼汗止瘧如舊再服白虎湯人參四錢石膏三錢知母一錢甘草六分米一撮煎服十餘貼而瘧止矣一人瘦長脆白年三十餘乆瘧後盗汗自汗過多加以傷食吐㵼大作吐止而㵼四日不住筋惕肉瞤驚悸夢遺小便不禁予診脉皆緩弱右則畧弦而濇曰此下多亡隂汗多亡陽氣血虛也遂以參茋為君白术為臣山枝麥門冬牡蠣為佐酸棗歸身山查為使加以薄桂煎服旬餘諸症稍退半年之間常覺臍下内熱一團烘烘不散時或夢遺浮梁孫醫誼作熱欝固欲下之予曰此非有餘之熱乃隂虛生内熱耳若欲下之是殺之耳宜以前方加黄栢熱當自退果驗一人年十七八時因讀書饑感寒得瘧延纏三年瘧愈寒氣臍左觸痛熱熨而散仍或發或止後因新娶往縣復受饑寒似病傷寒吐二日夜不止接服理中湯補中益氣湯固本丸補隂丸猪肚丸其吐或作或止飲食或進或不進續後受饑勞倦食則飽悶予至午前睡安畧爽食稍進午後氣升便覺脹悶胸膈漉漉水響四肢㣲厥吐水或酸或苦亦有間日吐者大便燥結小便赤短身體瘦弱不能起止予曰須不見脉見症必是禀賦素弱不耐饑寒宜作飲食勞倦為主而感冐一節且置諸度外夫氣升脹悶觸痛者脾虛不能健運以致氣鬱而然胸膈漉漉水聲謂之留飲乃用獨參湯補養其氣血加姜以安其嘔吐黄栢以降其逆氣初服三貼臍左痛除吐止將人參加作一兩吐又復作此由補塞太過而無行散佐使故也人參减作七錢附五分炮姜七分半夏八分蒼术七分厚朴七分茯苓一錢服至二十餘貼吐止食進餘病皆减頗喜肉味以手揉擦其肚尚有水聲汩汩㣲感寒腹中氣猶㣲動或時鼻衂數㸃近来忽㵼二日而自止纔住前藥又覺不爽前方加黄茋四錢山枝七分减黄栢如舊煎服或曰吐水或酸或苦大便閉燥小便赤短諸書皆以為熱凡病晝輕夜重諸書皆為血病今用姜附何也予曰吐水酸苦由脾虛不能行濕濕鬱為熱而水作酸苦也姜附性熱辛散濕逢熱則收鬱逢熱則散濕收鬱散酸苦自除大便燥結者由吐多而亡津液也小便短少由氣虛不能運化也兹用人參以養血氣則血潤燥除氣運溺通矣若用苦寒之藥則苦傷血寒傷氣寧不愈益其病哉日輕夜重為血病者道其常也此則不然須似血病而實氣病也醫作血病而用固本補隂等藥反不解非血病可知所以日輕者日則陽得其位而氣旺故病减夜則陽失其位而氣衰故病重經曰至於所生而持自得其位而起是也故病則有常有變而醫不可不達其變也病將愈猶或鼻衂數㸃者此浮溜之火也加山枝氣味薄者以潛伏之久當自愈後聞食母猪肉前病復作予曰臟腑習熟於藥病亦見化於藥再無如之何矣鼻衂流涕一人形近肥而脆年三十餘内有寵妻三月間因勞感熱鼻衂乆而流涕不休臭穢難近漸至目昏耳重食少體倦醫用四物凉血或用參茋補氣㒺有効者邀予診視脉皆浮濡而滑按之無力曰病不起矣初因水不制火肺因火擾涕流不休經云肺熱甚則出涕是也况金體本燥津液日泄則燥者枯矣乆則頭面諸陽之液亦因以走泄經云枯澁不能流通逆於肉理乃生􅏴腫是也予歸月餘面目耳傍果作􅏴瘡而卒後見流涕者數人亦多不救脇痛予婿王琇客揚州病脇痛醫以為虛用人參羊肉補之其痛愈甚鎭江錢醫治以龍會丸痛减予聞冒雪自蕪湖徒行至彼診之脉皆弦濡而弱曰脾胃為痛所傷尚未復也遂用橘皮枳术丸加黄連當歸服之而安越五年腹脇挿痛彼思頗類前病欲服龍會丸末决予又衝寒陸路至彼遂親扶持不成寐者數晩診之脉皆濡弱而緩曰前病屬實今病屬虛非前藥可治也遂以人參為君芎歸芍藥為臣香附陳皮為佐甘草山枝為使煎服十餘貼痛止而食進矣又後十餘年来賀予夀病滯下腹痛後重日夜四五十行診之脉皆濡弱近駛曰此熱傷血也以四物加㯽榔大黄下之四五行腹痛稍减後重不除仍用前方除大黄服十餘貼續吞香連凡獲安三病予三起之其勞甚矣情係丈婿恩同父子不知彼以父視我乎以人視我乎黟縣丞年逾五十京囬兩脇肋痛醫用小柴胡湯痛止續後復痛前方不効請予往治脉皆弦細而濡按之不足曰此心肺為酒所傷脾腎為色所損兩脇脹痛相火亢極肝亦自焚經云五臟已虛六府已極九候須調者死此病之謂歟果卒鼓脹一人年逾四十春間患脹醫用胃苓湯及雄黄傳貼法不効邀予診視脉皆緩弱無力曰此氣虛中滿也曾通利否曰已下五六次矣予曰病屬氣虛醫反下之下多亡隂是謂誅罰無過也故脉緩知其氣虛重按則無知其隂亡陽虛隂亡藥難倚仗八月水土敗時實可憂也乃問予曰今不與藥病不起耶嘗聞脹病臍突不治肚上青筋不治吾今無是二者予曰然也但乆傷於藥故且停服明日遂歸如期果卒一婦形瘦弱小脉細濡近駛又一婦身中材頗肥脉緩弱無力俱病鼔脹大如箕垂如囊立則垂墜遮攔兩腿有礙行歩邀子視之曰腹皮寛縋已定非藥可歛也惟宜安心寡欲以保命爾後皆因産而卒或曰鼔脹如此何能有孕予曰氣病而血未病也産則血亦病矣隂陽兩虛安得不死又一婦瘦長蒼白年餘五十鼓脹如前二婦頗能行立不耐乆逺越十餘年無恙恐由寡居血無所損故得乆延一人年踰四十瘦長善飲診之脉皆洪滑曰可治脉訣云腹脹浮大是出厄也但濕熱太重宜逺酒色可保終吉遂以香連丸令日吞三次每服七八十丸月餘良愈一人年三十餘酒色不謹腹脹如鼓醫用平胃散廣茂潰堅湯不効予為診之脉皆浮濡近駛曰此濕熱甚也逺酒逺色庶或可生彼謂甚畏湯藥予曰丸藥亦可遂以枳术丸加厚朴黄連當歸人參荷葉燒餕丸服一月果安越三餘月不謹復脹再為診之曰不可為也臍突如脹長二尺餘逾月而卒臍突寸餘者有矣長餘二尺者亦事之異故為記之莖中蟲出休邑西山金舉人嘗語人曰渠嘗病小腹甚痛百藥不應一醫為灸關元十餘壯次日莖中滛滛而癢視之如蟲出四五分急用鐡鉗扯出果蟲長五六寸連日蟲出如此者七條痛不復作初甚驚恐後則視以為常皆用手扯此亦事之偶中也仲景云火力須㣲内攻有力蟲為火力所逼勢不能容故從溺孔出也其人善飲御内膀胱不無濕熱遇有留血瘀濁則附形蒸鬱為蟲矣經云濕熱生蟲有是理也故癆蟲寸白蟲皆由内濕熱蒸鬱而生非自外至者也正如春夏之交濕熱鬱蒸而諸蟲生焉是矣此亦竒病故記之身痒一人年逾六十形瘦蒼紫夜常身痒搔之熱蒸皮内肉磊如荳粒癢止熱散肉磊亦消矣醫用烏藥順氣升麻和氣等不効詣予診之脉皆細濡近駛曰此血虛血熱也醫為順氣和氣所謂誅罰無過治非所宜遂以生地𤣥參白蒺藜歸芎茋芍黄芩甘草陳皮煎服月餘而愈膈噎一人年六十餘色紫平素過勞好酒病膈食至膈不下則就化為膿痰吐出食肉過宿吐出尚不化也初卧則氣壅不安稍乆則定醫用五膈寛中散丁沉透膈湯或用四物加寒凉之劑或用二陳加耗消之劑罔有効者来就予治脉皆浮洪弦虛予曰此大虛症也醫見此脉以為熱症而用凉藥則愈助其隂而傷其陽若以為痰為氣而用二陳香燥之劑則愈耗其氣而傷其胃是以病益甚也况此病得之酒與勞也酒性酷烈耗血耗氣莫此為甚又加以勞傷其胃且年踰六十血氣已衰脉見浮洪弦虛非吉兆也宜以人參三錢白术歸身麥門冬各一錢白芍藥八分黄連三分乾姜四分黄芩五分陳皮七分香附六分煎服五貼脉歛而膈頗寛食亦進矣淋一人形肥蒼白年五十餘病淋沙石澁痛醫用五苓或琥珀八政散之類病益加邀予往診脉皆濡弱而緩近駛曰此氣血虛也經云膀胱者津液之府氣化出焉今病氣虛不惟不能運化蒸溽而亦氣餒不能使之出也經又云血主濡之血少則莖中枯澁水道不利安得不淋醫用通利血愈燥氣愈傷矣遂用大補湯加牛膝煎服月餘病减仍服八味丸除附子加黄茋服半月餘遂獲安眼目一婦年逾四十兩眼昏昧咳𠻳頭痛似鳴而痛若過饑惡心醫以眼科治之病甚予診脉皆細弱脾部尤近弦弱曰脾虛也東垣云五臟六府皆禀受於脾上貫於目脾虛則五藏精氣皆失所司不能歸明於目矣邪逢其身之虛隨眼系入於腦則腦鳴而頭痛心者君火也宜静相火化行其令勞役運動則妄行侮其所勝故咳𠻳也醫不理脾養血而以苦寒治眼是謂治標不治本乃用參茋錢半麥門冬貝母各一錢歸身八分陳皮川芎黄芩各七分甘草甘菊花各五分麥芽四分煎服二貼諸症悉除白濁一人年逾三十季夏日午房後多汗晩浴又近女色因患白濁醫用胃苓湯加右眼作痛用四物湯入三黄服之睡醒口愈加苦又加左膝腫痛仲冬不藥濁止漸次延至背痛不能轉側日輕夜重嚏則如繩束撮腰脇痛不可忍呵氣亦應背痛或時夢遺次年正月請予診治脉皆緩弱無力左脉緩而畧滑曰此脾腎病也夫緩脾脉也緩弱無力脾虛可知左脉滑者血熱也遂以人參黄茋各二錢茯术歸身麥門冬各一錢牛膝神曲陳皮黄栢各七分甘草五味各五分煎服三十餘貼仍以龜板參茋黄栢各二兩熟地山茱萸枸杞杜仲歸茯牛膝各一兩丸服而愈咳𠻳一人形長色蒼瘦年逾四十每遇秋凉病痰𠻳氣喘不能卧春暖即安病此十餘年矣醫用紫蘇薄荷荆芥麻黄等以發表用桑白皮石膏滑石半夏以疏内暫雖輕快不乆復作予為診之脉頗洪滑曰此内有鬱熱也秋凉則皮膚緻宻内熱不能發泄故病作矣内熱者病本也今不治其本乃用發表徒虛其外愈不能當風寒疏内徒耗其津愈增鬱熱之勢遂以三補丸加大黄酒炒三次貝母𤓰蔞丸服仍令每年立秋以前服滚痰丸三五十粒病漸向安一婦年逾五十其形色脆弱每遇秋冬痰𠻳氣喘自汗體倦卧不安席或嘔惡心診之脉皆浮緩而濡曰此表虛不禦風寒激内之鬱熱而然遂用參茋各三錢麥門冬白术各一錢黄芩歸身陳皮各七分甘草五味各五分煎服十餘貼而安每年冬寒病發即進此藥次年秋間滯下腹痛後重脉皆濡細稍滑予曰此内之鬱熱欲下也體雖素弱經云有故無損遂以小承氣湯利兩三行腹痛稍除後重未退再以補中益氣湯加枳壳黄芩芍藥煎服仍用醋澆熱磚布裹坐之而愈是年遇寒𠻳喘亦不作矣一婦産後咳𠻳痰多晝輕夜重不能安寢飲食無味或時自汗醫用人參清肺湯𠻳愈甚予為診之脉浮濡近駛曰此肺熱也令服保和湯五貼而安一婦懷妊七月𠻳喘不能伏枕兩臀坐乆皮皆潰爛醫用蘇子降氣湯三抝湯參蘇飲罔有効者邀予診之右脉浮濡近駛按之無力左脉稍和曰此肺虛也宜用補法遂以人參錢半白术麥門冬各一錢茯苓八分歸身阿膠黄芩各七分陳皮五味甘草各五分煎服五七貼而痊一童子八歲傷寒咳𠻳痰少面赤日夜不休丁氏小兒科治以參蘇飲數日𠻳甚予為診之脉洪近駛曰熱傷肺也令煎葛氏保和湯二服如失氣痛氣逆一婦瘦弱年四十餘患走氣遍身疼痛或背脹痛或兩脇挿痛或一月二三發發則嘔盡所食方快飲食不進乆伏床枕醫作氣治用流氣飲或作痰治用丁藿二陳湯病甚邀予視之脉皆細微而數右脉尤弱曰此恐孀居憂思傷脾而氣鬱也理宜補脾散鬱以人參三錢香附砂仁黄芩甘草各五分黄茋二錢歸身錢半川芎八分乾姜四分煎服十餘貼脉之數而弱者稍緩而健諸痛亦减仍服前方再用人參黄茋川芎香附山枝甘草以神麯糊丸服之病除邑庠司訓蕭先生年逾五十形肥色紫病氣從臍下冲逆而上睡卧不安飲食少精神倦予為診之脉皆浮濡而緩曰氣虛也問曰丹溪云氣從臍下起者隂火也何謂氣虛予曰難執定論丹溪又云肥人氣虛脉緩亦氣虛今據形與脉當作氣虛論治遂以參茋為君白术白芍為臣歸身熟地為佐黄栢甘草陳皮為使煎服十餘貼稍安彼以胸膈不利陳皮加作七分氣冲上仍守前方月餘而愈身麻一婦或時遍身麻痺則懵不省人事良乆乃甦醫作風治用烏藥順氣散又用小續命湯病益甚邀予診之脉皆浮濡緩弱曰此氣虛也麻者氣餒行遲不能接續也如人乆坐膝屈氣道不利故伸足起立而麻者是也心之所養者血所藏者神氣運不到血亦罕来由心失所養而昏懵也遂用參茋各二錢歸身茯苓門冬各一錢黄芩陳皮各七分甘草五分煎服而愈秘結一婦嫠居改嫁乘轎勞倦加以憂懼成婚之際遂病小腹脹痛大小便秘結不通醫以硝黄三下之隨通隨閉病增胸膈胃脘脹痛自汗食少予為診之脉皆濡細近駛心脉頗大右脉覺弱予曰此勞倦憂懼傷脾也蓋脾失健運之職故氣滯不行以致秘結今用硝黄但利血而不能利氣遂用人參二錢歸身錢半陳皮枳壳黄芩各七分煎服而愈石山醫案卷上
