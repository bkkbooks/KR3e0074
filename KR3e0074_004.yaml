body:
  text: 石山醫案附録明陳桷撰辨明醫雜著忌用參蓍論按汝言王公撰次明醫雜著其中有曰若酒色過度傷損肺腎真隂咳嗽吐痰衄血咳血咯血等症此皆隂血虛而陽火旺也宜甘苦寒之藥生血降火若過服參蓍等甘溫之藥則死不可治蓋甘溫助氣氣屬陽陽旺則隂愈消故也又云咳嗽見血多是肺受熱邪氣得熱而變為火火盛而隂血不寧從火上升治宜滋隂㵼火忌用人參等補氣之藥又撰次本草集要云人參入手太隂而能補火故肺受火邪咳嗽及隂虛火動勞嗽吐血者忌用之誤用多致不救豫嘗考其所序因皆本之丹溪然丹溪豫無間然矣而王氏未免有可議者丹溪曰治病必分血氣氣病補血雖不中病亦無害也血病補氣則氣愈虛散矣此所以來王氏陽旺則隂愈消之說也丹溪又曰補氣用人參然蒼黑人多服之恐反助火邪而爍真隂此所以乂來王氏咳嗽見血多是火盛隂虛忌用人參補氣之論而集要復有人參補火肺受火邪勞嗽吐血等症忌用人參之戒也夫王氏之言雖出丹溪但過于矯揉而又失之於偏也不曰誤服參蓍多致不救則曰多服參蓍死不可治言之不足又復申之惟恐人以咳嗽失血為氣虛不作隂虛主治也篇末雖曰亦有氣虛咳血之言又恐人因此言復以咳嗽失血為氣虛故即繼之曰但此症不多爾是以愈來後人之惑使凡遇咳血雖屬氣虛終以前言為主而參蓍竟莫敢用也殊不知丹溪立法立言活潑潑地何嘗滯于一隅于此固曰血病忌用參蓍于他章則又曰虛火可補參术生甘草之類又曰火急甚者兼㵼兼緩參术亦可是丹溪治火亦未嘗廢人參而不用王氏何獨但知人參補火而不知人參能㵼火邪丹溪又曰隂虛喘嗽或吐紅者四物加人參黃柏知母五味麥門冬又曰好色之人元氣虛咳嗽不愈瓊玉膏肺虛甚者人參膏凡此皆酒色過傷肺腎咳嗽吐血症也丹溪亦每用人參治之而無疑王氏何獨畏人參如虎邪叮嚀告戒筆不絶書宜乎後人印定耳目確守不移一遇咳嗽血症不問人之勇怯症之所兼動以王氏藉口更執其書以證致使良工為之掣肘病雖宜用亦不敢用惟求免夫病家之怨尤耳病者亦甘心忍受苦寒之藥縱至上吐下㵼去死不逺亦莫知其為藥所害興言及此良可悲哉兹取丹溪嘗治驗者以證之一人咳嗽惡寒胸痞口乾心微痛脉浮緊而數左大於右蓋表盛裏虛聞其素嗜酒肉有積後因行房涉寒冒雨忍饑繼以飽食先以人參四錢麻黃連根節錢半與二三貼嗽止寒除改用厚朴青陳皮瓜蔞半夏為丸參湯送下二十服而痞除夫既咳嗽嗜酒不可謂肺無火也復因行房感冒不可謂隂不虛也初服人參四錢再用參湯送藥不可謂不多服也何如不死又一人患乾咳嗽聲啞用人參橘紅各錢半半夏麴一錢白术二錢知母瓜蔞桔梗地骨皮各五分夏加黃芩五分入姜煎仍與四物加炒蘖童便竹􅅹姜汁二藥晝夜相間服兩月聲出而愈夫患乾咳嗽聲啞不可謂肺無火邪也不可謂隂不受傷也服人參兩月不可謂不多也乂何如不死又一壯年因勞倦不得睡咳痰如膿聲不出時春寒醫與小青龍湯喉中有血絲腥氣逆上漸有血線自口右邉出晝夜十餘次脉弦大散弱左大為甚此勞倦感寒强以辛甘燥熱之劑動其血不治恐成肺痿遂以參蓍歸术芍藥陳皮生甘草帶節麻黃煎入藕汁服二日嗽止去麻黃與四日血除但脉散未收食少倦甚前藥除藕汁加黃芩砂仁半夏半月而愈夫嗽痰如膿聲不出者不可謂肺不熱也又以甘辛燥熱動其血不可謂血不病也服參蓍亦不可謂不多也又復何如而不死凡此諸病以王氏言之未免皆作酒色傷隂而用滋隂㵼火之藥然而丹溪率以參蓍等劑治之而愈並不見其助火增病者蓋病有所當用不得不用也雖勞嗽吐紅亦有所不避也且古今治勞莫過于葛可久其保真湯獨參湯何嘗廢人參而不用但詳其所挾之症何如耳豈可謂其甘溫助火一切棄而不用哉肺受火邪忌用人參其原又出於海藏本草液之所云而丹溪實繹其義不意流弊至于如此又嘗因是而推廣之丹溪曰蒼黑之人多服參蓍恐助火邪而爍真隂肥白之人多服最好此固然矣考其嘗治一人形瘦色黑紫多酒不困年半百有别館一日大惡寒發戰言渴不飲脉大而弱右關稍實略數重則澀以王氏觀之以形色論之正合滋隂㵼火之法而丹溪謂此酒熱內鬱不得外泄由表熱而虛也用黃蓍二兩乾葛一兩煎飲之大汗而愈既不以蒼黑忌用參蓍為拘亦不以酒色傷隂忌服參蓍為禁是知丹溪立言以示人者法之常施治而不以法為拘者善應變也王氏但知其立法之常而未察其治不以法為拘之變故於參蓍等劑每每畏首畏尾若不敢投蓋亦未之考也雜著所制諸方雖未嘗盡廢參蓍察其用處必須脉之細微而遲者方始用也然而東垣丹溪之用參蓍亦不専在于此東垣曰血虛脉大症象白虎誤服白虎湯者必死乃用黃蓍六錢當歸一錢名曰當歸補血湯以治之是血虛脉大東垣亦嘗用黃蓍矣丹溪曰一人滯下一夕昏仆目上視溲注汗泄脉大無倫此隂虛陽暴絶也蓋得之昏後酒色急灸氣海服人參數斤而愈是隂虛脉大丹溪亦嘗用人參矣豈必脉之細微遲者而後用哉考之本草仲景治亡血脉虛以人參補之取其隂生于陽甘能生血故血虛氣弱仲景以人參補之是知人參不惟補氣亦能補血況藥之為用又無定體以補血佐之則補血以補氣佐之則補氣是以黃蓍雖専補氣以當歸引之亦從而補血矣故東垣用黃蓍六錢只以當歸一錢佐之即名曰補血湯可見黃蓍功力雖大分兩雖多為當歸所引不得不從之補血矣矧人參功兼補血者邪人參性味不過甘溫非辛熱比也稍以寒涼佐之必不至助火如此之甚雖曰積溫成熱若中病即已亦無是也夫芎歸味辛甘溫世或用治勞熱血虛之病並無所疑然辛主耗散本非血虛所宜彼人參雖甘溫而味不辛比之芎歸孰輕而孰重哉抑勞嗽吐血隂虛之病亦有始終不用人參莫克全其生者何也或肉食不節則古人所謂厚味厝熱也或房勞不逺則古人所謂縱欲傷生也二者不謹而獨致畏於人參是謂不能三年之喪而緦小功之察何其謬邪噫醫之用藥固所當審不可輕視人之生死如咳嗽失血等症若果脾强胃健飲食無阻則當從王氏所論與之滋隂㵼火固無不可設或上兼嘔逆中妨飲食下生泄泄汗自泄而洗洗惡寒四肢倦而兀兀多睡則又當從隂虛陽虛權其輕重而兼治之可也苟不如此而専主乎王氏未免陷于一偏而有無窮之患矣故豫不得不極論之莫辭乎僭踰之罪焉正德庚辰二月朔旦新安祁門省之撰病用參茋論門人和溪程鐈廷彛撰夫氣屬陽血屬隂陽衛于外隂守于中陽動隂靜動多則發泄而外虛靜多則神藏而內固外虛者邪易入內固者疾難攻故曰邪氣乘虛而入又曰邪之所凑其氣必虛是人之安危皆由陽氣之虛實也經曰陽精所降其人夭隂精所奉其人夀蓋陽主發泄故皮膚䟱豁而陽氣不藏所以多天隂主收斂故凑理閉密而陽不妄泄所以多夀是人之夀夭亦由陽氣之存亡也經曰無泄皮膚使氣亟奪又曰冬不按蹻無擾乎陽是聖人未常不保養其陽矣故仲景之傷寒東垣之脾胃皆以陽氣為主而參茋為所必用之藥也故曰參茋補陽經言陽常有餘而補之寧不犯實實之戒乎豫曰慓悍之衛其氣不虛無待于補丹溪曰此氣若虛則一旦暴絶而死矣兹所補者乃榮中之衛其氣曷常不虛經曰勞則氣耗悲則氣消又曰熱傷氣精食氣又曰壯火食氣非藉于補安能營運于外而為血所使哉參茋之補補此營中之氣也補營之氣即補營也營者隂血也丹溪曰人身之虛皆隂虛者此也或曰慓悍之衛不受邪也仲景何謂寒傷營風傷衛乎余曰此亦指營中之衛也邪之所傷藥之所治皆此營衛耳或曰經言水之精氣為營營行脉中不能行於脉外無分晝夜周流不休定息數應漏刻屬于隂也食之濁氣為衛衛行脉外不能入於脉中晝但行陽二十五度夜則行隂二十五度不與營同道不與息數應屬于陽也內經所論營衛如此未聞營中有衛也豫曰內經所論以隂陽對待言特舉其大者耳細而分之營中亦自有衛也易曰陽竒隂偶故悍衛為陽而竒營血屬隂則兩也或曰營中之衛亦分晝夜內外乎余曰無分晝夜而內外相通營行脉中而亦行于脉外凡皮膚有傷不待內及于經即便血出可見亦行於脉外矣衛行脉外亦行於脉中蓋血屬隂而主靜苟非氣貫其中安能周流而灌溉可見亦行於脉中矣或曰營中有衛有所本乎豫曰本靈樞也靈樞曰人受氣于穀穀入于胃以𫝊于肺五臟六腑皆以受氣氣之清者為營濁者為衛營行脉中衛行脉外衛行脉外營周不休又曰其浮氣循于經者為衛氣其精氣行于經者為營氣又曰營衛者精氣也又曰營氣衛氣皆津液之所成是靈樞所言皆營衛同一氣營衛一氣則營中有衛可知矣故曰營與衛異名而同類是也內經分而言之則營衛不同道靈樞合而言之則營衛同一氣也或曰經言某經氣多血少某經氣少血多亦此營衛耶余曰此指各經禀受氣血多少而言非此流行之營衛也營衛流行安得行至某經而血加多行至某經而血加少耶然營氣衛氣皆藉水穀而生故人絶水榖者死經曰脾胃者水穀之海但脾胃受傷不一經曰飲食傷脾又曰勞倦傷脾又曰憂思傷脾與夫房勞大怒大驚莫不皆傷脾與胃也是以諸病亦多生于脾胃此東垣所以拳拳於脾胃也脾胃有傷非藉甘溫之劑烏能補哉經曰脾胃喜溫而惡寒參茋味甘性溫宜其為補脾胃之聖藥也脾胃無傷則水穀可入而營衛有所資元氣有所助病亦不生邪亦可除矣故諸病兼有嘔吐泄㵼痞滿食少怠倦嗜卧口淡無味自汗體重精神不足懶于言語惡風惡寒等症皆脾胃有傷之所生也須以參茋為主其他諸症可隨證加入佐使以兼治之但佐使分兩不可過多于主藥耳或者病宜參茋有用之而反害者非參茋之過乃用者之過也如病宜一兩祗用一錢而佐使分兩又過于參茋則參茋奪於羣衆之勢弗得以専其功矣以此而歸咎于參茋寧不惑哉或者病危有用參茋無益者經曰神不使也夫藥氣賴神氣而為助病壞神離雖參茋亦無如之何矣又謂參茋性溫祗恐積溫成熱又謂參茋補氣尤恐氣旺血衰殊不知有是病用是藥有病則病氣當之何至於積溫成熱氣旺血衰乎且參茋性雖溫而用芩連以監之則溫亦從而輕減矣功雖補氣而用枳朴以制之則補性亦從而降殺矣慮其滯悶也佐之以辛散慮其助氣也輔之以消導則參茋亦莫能縱恣而逞其惡矣或曰吐血衄血血崩明是血病今見亦用參茋寧免血愈虛耶東垣曰脫血益氣古聖人之法也仲景曰陽旺則生隂靈樞曰上焦開發宣五穀味兼膚充身澤毛若霧露之溉是謂氣中焦受氣取汁變化而赤是謂血是能生血可知矣且造化之理氣惟陽能生隂而隂不能生陽故血虛也仲景以人參補之血崩也東垣以參茋固之今之得醫道正傳者其治血病或用參茋蓋本於此夫豈率意而妄用哉豫幸受業於石山汪先生見其所治之病多用參茋蓋以其病已嘗遍試諸醫厯嘗諸藥非發散之過則降泄之多非傷于剛燥則損于柔潤胃氣之存也幾希矣而先生最後至不得不用參茋以救其胃氣實出于不得已也非性偏也其調元固本之幾節宣監佐之妙又非庸輩可以測識是以往往得收竒效全功而人獲更生者率多以此或者乃謂其不問何病而専以參茋為劑是不知先生也豫嘗得之於觀感之餘而心獨識之故筆之于篇誠恐或有所遺忘也若以此而語之人則必笑而且排謂豫何愚之甚先考府君古朴先生行狀府君諱渭字以望别號古朴世為祁門臨清之朴墅人出唐越國公華長子朗州法曽建之後建四𫝊至璹始遷古黟赤山鎮即今祁門縣也其後有諱新一者元季復遷今居曽祖諱乾字德髙以善名於鄉國初禁嚴動觸法網得以善終人謂其良善所致嘗謂耆老民間利病多有建白衆感其德遂聞于官為立坊表于市扁曰崇善特署其名以志異祖諱道昱字仕政殫其財力脫親于難篤孝志養克亢厥宗考諱輪字世搆深沉善謀臨事奮決佐父理家政竭力苦思弗之恤故仕政公得以充拓其業者多世備公力也妣方氏休寧大坑彥靜公女得公最晚深所鍾愛為兒童時仕政公見之輒曰此兒過于嬌養異日殆覆吾家及長公每以此自勵衣不錦綺食甘粗淡惟恐有墜以辱先人同産弟侄或欲以田之貴而少者易彼田之賤而多者公曰以少易多固為有利然此筆一動其流之弊漸趨於下恐併其賤者而失之諺曰一馬換三驢三驢換九兔正此謂也吾平生未嘗有一賣字與人特以此耳固執不從同輩有經商稇載而歸者妻孥夜聚燈下或以語公耳若弗聞見人富貴未嘗羡慕遇貧下亦不辱嫚素不好飲頗喜奕棊或優遊泉石或往返鄉鄰于一切世務漠如也然性朴實簡易不事邉幅人有善行則樂道之惟恐其為之不力人有不善則面詰之不為少隱蓋公素以直聞人亦不以為怪又嘗服役縣治吏胥輩覘公坦率欺紿稱貸公皆受劵貸之既不詰其詐亦不責其償年六十學士篁墩公皆賦古朴行一章以贈之可謂深得公之心也凡諸技藝之流亦皆達其肯棨技之巧拙莫得而欺之皆服其有識機備員邑庠時舉行鄉飲有隂求為鄉老者機以語公公深恥之以不與為榮後同輩有以公名上者機覘知公意乃告之曰家君素性間散一旦拘之以禮法煩之以拜跪是違其志也遂以寢其請公年八十恩例當得冠帶表兄陳世用于公為舅甥時為雄縣尹奉為冠帶公夀公曰此非吾所樂也却之不受其不願乎外也如此世備公亦知醫至公益精其業東垣丹溪諸書誦讀不釋手嘗曰東垣主于升陽補氣丹溪主于滋隂降火東垣丹溪易地則皆然然病當升陽治法則從東垣病當滋隂治法則從丹溪不可以南北異宜而執泥也有病者求診即往應之報不報弗之計休寧流口李氏長于産科有李君愛妻謝氏形肥而長面色紫淡産後病喘不能卧消榖善饑汗出如洗其家依法治之不驗請公診視曰此隂虛陽亢當合東垣丹溪兩法治之遂飲以藥旬餘而愈彼乃笑語人曰藥乃聽公使也我亦此藥但不聽我使耳公聞之曰醫之用藥如將之用兵使之以道則從使之不以道弗聽或分兩失多寡之宜補㵼亂君臣之等皆使之不以道也夫何聽之使邪衆服其言又大坑方汝髙公表弟也尹德興日嘗染瘴瘧久不愈醫以瘧治或作或輟延及二年請公往治公曰此虛瘧也初因內食膏粱外感暑熱厚味為暑所鬱聚而為痰故成此病醫與瘧藥率多燥烈袪痰之劑今已無痰可去但病久胃虛暑邪深入無從而出但補其正氣充實則邪無容留矣經云邪之所凑其氣必虛又云壯者氣行則愈怯者著而成病此之謂也遂先用補中益氣湯以復其正繼用清暑益氣湯以逐其邪月餘病果獲安邑東孚溪李瑕公妻姨子也忽以背癰告急懇公治之有謝某者已為驅熱拔毒痛腫已熾遂告技窮公疹之曰此易易耳無用藥也遂煎醋一碗入鹽少許以紙數重漬塌腫上再以銅斗盛火尉之不數易而病如失謝某在傍熟視因相謔曰公治此病只消醋一碗耳邑庠生饒廷信面顴有核不紅不痛漸覺髙起彼深惡之乃告于公公取毫針燒而刺之以藥絍其針孔令日絍藥三次七日乃止或有焮痛可取冷水沃之復語之曰再得七日核當脫去我别以膏藥𫝊之復過七日則平復矣一如公言同里謝君恕之機舊親家也壯嵗嘗病左腳痺痛醫作風治不愈邀公疹視公曰人身之血猶溪河之水也細流則阻滯得冷則凝聚此病得于新娶之後未免血液勞損而凝礙加以寒月涉水益其滯安得不痺滯久不散鬱而為熱而成毒腫若能預加滋養庶幾毒潰可免後患遂令服四物湯加牛膝紅花黃柏等四五十貼其家見病不退復疑欲用風藥公曰補藥無速效病邪不退藥力未至也令守前方每貼加人參四五錢痺除而肌亦易長後覺左腳縮短四五寸衆以為躄公曰年尚壯無慮也候血氣充足則筋得所養而自伸矣後果平復如故婺源延山有余姓者病噎人皆謂其不起邀公往視以此正合丹溪胃口乾槁之論例用五膈寬中平胃散病在決死若能滋隂養血補脾開胃加之竹􅅹以清痰人乳以潤燥庶或可生其家依法治之而愈歙西莘墟吳處士綱年踰六十味厚形腴病背左右脾下對發兩疽于公為世契致書懇請是時澄潭吳外科者已為處治公至疹視良久乃起語其家曰病不可為矣復叩吳醫曰此病從何而起曰毒熱有虛實耶曰毒熱內攻癰腫外作無虛病也作何處治曰宣熱敗毒而已在何經絡吳遂默然公曰經云榮氣不從逆於肉理乃生癰腫蓋謂老年之人血少凝沮加之厚味作痰阻塞經路血行肉理豈能從順不阻于此則留于彼舊汚之血既凝新來之血復滯因仍穢積鬱而為熱是以血肉化膿而潰爛也況邪之所凑其氣必虛安有老年無虛證耶始若補養正氣使復健運之常或可衝蕩邪著尚有可生之理兹乃不分經絡不辨虛實不審時令不别冷熱槩用連翹托裏五香連翹等湯所謂盲人騎瞎馬半夜臨深池保其無危難矣明日遂歸病果不起公之治療不苟大率類此其他竒中奏捷莫能盡述此特舉其大略者耳祖妣喪後二年世備公七十有二夜半卒病左體痿痺公愕然曰老年而得是病藥難倚仗莫若時具甘㫖以保終其天年庶幾少逭人子之責于是左右奉養席地夜坐卧其側者三年未嘗少懈衣被穢汚不敢委之他人恐其有嫌常挈至河躬洗濯之同里謝君賓時或見之後常以此語機輒加稱歎及卒葬祭以禮墓雖限以大河去家五里不時展省至老不倦嚴寒盛暑亦不為阻手植松柏果木不數嵗鬱然成林配儒人方氏亦休寧大坑邦用公女性迂遲整潔勤於女工尤善守舊逮公遣嫁二女率多藉其舊時資裝閨閫之中器物各有定處截然不亂几案時加整拭絶無塵垢衣服簪珥雖不華靡常潔如新然公之業有所增益者孺人與有力焉一門妯娌多其族之姊妹或伯叔他出或攜兒女往萃其室相與話舊每至夜分常令二婢守夜以俟其歸時婢皆及笄公每就牀鼾寢旁若無婢其逺女色如此人謂其夀多病少或由于此族衆創立宗祠公始聞之喜動顔色祠去所居之南二里許公年八十日常杖屨以臨惟恐事之不成也正德乙亥冬十有二月念二日子機歸自歙見公暴日堂廡進而揖曰安否何如公曰近病氣喘望汝甚急汝歸吾無憾矣扶歸寢室尚覺如常越二日忽語機曰不出三日吾與汝訣别矣機駭問曰何為遽出此言公曰病喘而氣口脉陷理無可生機急以生脉湯進公却之曰夀比吾父已多八年世無不散筵席何以藥為再明日機又問飲粥否公曰汝婦平素烹調稍適吾口可令煮粥半盂以飼我婦乃如命躬奉以飼公即吞咽無阻既而復寢少頃起語機曰婦等尚在耶皆應曰在公乃舉手作揖曰謝諸婦矣是夕二鼓公乃憑几俯卧意似甚煩機强扶掖就牀以手熱尉其足問之尚應聲曰亦覺頗快忽又問母所在機曰假寢帷側公乃唯唯鞠手撫膺而遂逝焉是夜念六日也嗚呼痛哉距生宣德癸丑某月日享年八十有三孺人方氏諱月貞歿正德庚辰十二月念六日距生宣德己酉某月日享年九十有三嘉靖改元壬辰十月十五日合葬於邑東小魁源坐亥面已子男三人長楎次機次柱三媳程氏謝氏吳氏女二蘭秀妙秀孫男八耀炅勳炯爌焮熒燧孫女四竒仙妃仙淑仙蕊仙曾孫男八天秩應達應逺龍夀天倫應逵某某曽孫女四含英初英天弟某俱幼嗚呼古人有言創業固難守成不易故國君以能守社稷為孝士庶人以能守田廬為孝今公之守先業也兢兢業業不失尺寸亦可謂能守而孝者矣其他儉以奉身而不慕乎外惠以及物而不施其勞寡嗜欲尚簡易逺酒色是皆公之德之可法者也豈容默默機幼承庭訓遣入邑庠既而告歸于家幸得以志養公甚樂之深愧不才不能為世用以遂顯揚之願追思夙昔五內崩摧今公之歿也又不能以發其幽光之萬一不孝之罪莫此為甚爰謹述平生大槩為狀于右以求當代立言君子庶有所徴云非敢妄為之說以貽公羞也嘉靖元年秋九月望日不孝男汪機泣血謹狀石山居士傳鏡山散人李汛彥夫撰居士姓汪名機字省之其先出越國公華長子朗州法曹建之後四傳至璹者始遷古黟赤山鎮即今祁治石山也其後諱新一者元季復遷石山之南曰朴墅鄉人本其所自出尊之曰石山居士云居士性恬淡不喜奢靡動法古人一本於誠言出未嘗不踐平居粗衣糲食類儉者至義之所當為視棄百金如一羽耳其弟柱客死廣東海徼命子炅往取具柩備厯艱險始克柩歸而所費一無所問達祖墳墓失業他姓率衆復之費尤不較族人欲立宗祠籌之工巨非白金六十斤餘不可衆難之居士即任十之二曰尊祖敬宗又何惜焉于是衆皆趨赴不日而成處家庭和易不苟人皆樂從如嫁娶喪祭並依家禮立規行二十餘年罔有違者御傭工佃人俱有恩嘗戒其子弟曰民有四業皆不可離義之一字其立心制行大略如此早嵗習春秋經補邑庠弟子員屢試不利其考以望公喻之曰昔范文正公嘗自禱曰不為良相願為良醫意謂仕而不至于相則其澤之所及顧不若醫之博耳蓋翁嘗以醫活人至數千指故以此喻居士悟即棄去科舉浮文肆力醫家諸書參以周易及儒先性理奧論而融㑹於一皆餘醫所未聞也其母儒人病頭痛嘔吐十餘年居士起之如故以望公晚年三染疾亦三起之公曰醫力如此牲鼎何足羡耶於是益加研究診治病者百試百中疾如桴鼓聲名益彰遐邇以疾來請者無虛日居士隨請隨就不可起者直告之不隱可起者竭力治之至忘寢食若王公貴人稍不為禮不應也其自重又如此久之求者益衆所應益博活人至數萬指都里姓名脉色及方症其徒周臣許忠厯厯紀之為書曰石山醫案試略言之郡侯張歉齊公年逾五十過勞怠倦煩悶惡食不爽居士疹之脉浮小濡緩曰此合東垣勞倦傷脾之論也冬春宜倣補中益氣湯例夏秋宜倣清暑益氣湯例依法守方服之良愈又常慮子遲居士復為疹之曰浮沉各得其位大小不踰其矩後當有子果如所言歙呈坎羅斯總年踰三十病中滿朝寬暮急屢醫不效居士疹視脉浮小而弦按之無力曰此病宜補以人參二錢白术茯苓各一錢黃芩木通歸尾川芎各八分梔子陳皮各七分厚朴五分煎服且喻之曰初服略脹久則寬矣彼疑氣無補法居士曰此世俗之言也虛氣不補則失其健順之常痞滿無從消矣經曰塞因塞用正治此病之法也服之果愈其弟斯俊形實而黑病咳痰少聲嘶間或咯血居士疹之右脉大無倫時復促而中止左脉比右略小而軟亦時中止曰此肺脾腎三經之法也蓋秋陽燥烈熱則傷肺加之以勞倦傷脾脾為肺母母病而子失其所養女色傷腎腎為肺子子傷必盜母氣以自奉而肺愈虛矣法當從清暑益氣湯例而增減之以人參二錢或三錢白术白芍麥門冬茯苓各一錢生芐歸身各八分黃柏知母陳皮神曲各七分少加甘草五分煎服或曰明醫雜著云凡病喘嗽咳血肺受火邪誤用參蓍多致不救謂何曰醫者意也徒泥陳言而不知變烏足以言醫人參雖溫雜于酸苦甘寒羣隊藥中奪于衆勢非惟不能為害而反為之用矣孟子曰一薛居州獨如宋王何此之謂歟患者聞之喜曰非通儒者論不及此鋭意煎服月餘而安羅汝聲年五十餘形瘦而黑理䟱而澀忽病腹痛午後愈甚醫曰此氣痛也治以快氣之藥痛益加又曰午後血行隂分加痛者血滯于隂也煎以四物湯加乳沒服之亦不減詣居士疹之脉浮細而結或五七至一止或十四五至一止經論止脉漸退者生漸進者死今止脉頻則反輕䟱則反重與脉經實相矛盾居士熟思少頃曰得之矣止脉䟱而痛甚者以熱動而而脉速頻而反輕者以熱退而脉遲故耳病屬隂虛火動無疑且察其病起於勞欲勞則傷心而火動欲則傷腎而水虧以人參白芍補脾為君熟芐歸身滋腎為臣黃柏知母麥門冬清心為佐山查陳皮行滯為使人乳童便或出或入惟人參漸加至四錢或五錢遇痛進之即愈或曰諸痛與瘦黑人及隂虛火動參蓍並在所禁今用之顧效謂何居士曰藥無常性以血藥引之則從血以氣藥引之則從氣佐之以熱則熱佐之以寒則寒在人善用之耳況人參不特補氣亦能補血故曰血虛氣虗當從長沙而用人參是也所謂諸痛不可用參茋者以暴病形實者言耳羅君年踰五十氣血向衰矣不用補法氣何由行痛何由止經曰壯者氣行則愈是也或者唯唯臨河程正剛年三十餘形瘦體弱忽病上吐下瀉勺水粒米不入口者七日自分死矣居士疹脉八至而數曰當仲夏而得是脉暑邪深入也上吐下㵼不納水穀邪氣自甚也宜以暑治焉或曰深居髙堂暑從何入居士曰東垣云逺行勞倦動而得之為傷熱髙堂大厦靜而得之為傷暑此正合靜而傷暑之論也但彼用溫熱以暑邪在表此則暑邪已深入矣變例而用清涼之劑可也遂以人參白虎湯進半杯良久再進一杯遂覺稍安家人皆大喜曰藥能起死回生果然三服後減去石膏知母再以人參漸次加作四五錢黃柏陳皮麥門冬等隨所兼病而為佐使一月後平復如初程福仁體肥色白年近六十痰喘聲如曳鋸夜不能卧居士診之脉浮洪六七至中或有一結曰喘病脉洪可治也脉結者痰礙經隧耳宜用生脉湯加竹􅅹服之至十餘貼稍定患者嫌遲更醫服三拗湯猶以為遲益以五拗湯危矣其弟曰汪君王道醫也奈何欲速至此于是復以前方服至三四十貼病果如失一婦形肥色淡紫年幾三十艱于育子居士脉之兩尺脉皆沉微法當補血以形言之肥人氣虛亦當補氣遂令多服八物湯仍以補隂丸加參蓍空腹吞之三月餘有孕復為診之兩尺如舊以理論之孕不當有昔人云脉難盡憑殆此類歟侍御槐塘唐君景之形肥色黑素畏熱而好飲年三十餘忽病自汗如雨四肢俱痿且惡寒小便短赤大便或溏或結飲食亦減醫作風治用獨活寄生湯小續命湯弗效五月間居士往視脉沉細而數約有七至曰此痿症也丹溪云斷不可作風治經云痿有五皆起於肺熱只此一句便曉其治之法矣經又云治痿獨取陽明蓋陽明胃與大腸也胃屬土肺屬金大腸亦屬陽金金賴土生土虧金失所養而不能下生腎水水涸火盛肺愈被傷況胃主四肢肺主皮毛今病四肢不舉者胃土虧也自汗如雨者肺金傷也故治痿之法獨取陽明而兼清肺經之熱正合東垣清燥湯服百貼果愈鄭村汪鈿長瘦體弱病左腹痞滿穀氣偏行于右不能左達飲食減大便滯居士診其脉浮緩而弱不任尋按曰此土虛木實也用人參補脾枳實泄肝佐以芍藥引金泄木輔以當歸和血潤燥加厚朴陳皮以寬脹兼川芎山梔以散鬱服十餘貼稍寬因糞結滯思飲人乳居士曰祗恐大便滑耳果如言遂辭乳媪仍服前藥每貼加人參四五錢後思香燥物曰脾病氣結香燥無忌也每日因食燥棐一二十枚炙蒸餅十數片以助藥力年餘而安庠生羅君輔年三十餘嘗因冒寒發熱醫用發表不愈繼用小柴胡熱熾汗多遂昏昏憒憒不知其身之所在卧則如雲之停空行則如風之飄毛兼又消穀善饑夢遺諸證居士觀其形類肥者曰此內火燔灼而然虛極矣疹其脉皆浮洪如指曰脉經云脉不為汗衰者死在法不治所幸者脉雖大按之不鼓形雖長而色尚蒼可救也醫以外感治之所謂虛其虛誤矣經云邪氣乘虛而入宜以內傷為重遂以參蓍歸术大劑少加桂附服十餘貼病減十之二三再除桂附加芍藥黃芩復十餘貼病者始知身卧于牀足履于地自喜曰可不死矣服久果起槐充胡本修監生年踰三十形肥色白酒中為人折辱遂病心恙或持刀或踰垣披頭大呌居士診之脉濡緩而虛按之不足曰此陽明虛也宜變例以實之庶幾可安先有醫者已用二陳湯加紫蘇枳穀等藥進二三貼矣聞居士言即厲聲曰吾治將瘥誰敢奪吾功乎居士遂告回醫投牛黃清心丸如彈丸者三枚初服頗快再服燥甚三服狂病倍發撫膺號曰吾熱奈何急呼水救命家人守醫者言禁不與趨樓見神前供水一盂一呷而盡猶未快也復趨厨房得水一桶滿意飲之狂勢始減半其不死幸爾復請居士治之以參蓍甘草甘溫之藥為君麥門冬片黃芩甘寒之劑為臣青皮䟱肝為佐竹􅅹青痰為使芍藥茯苓隨其兼證而加減之酸棗仁山梔子因其時令而出入之服之月餘病遂輕然或目系漸急即瞀昧不知人事良久復蘇居士曰無妨此氣血未復神志昏亂而然令其確守前方夜服安神丸朝服虎潛丸以助其藥力年餘熟寢一月而瘥越十餘年因久坐腰痛肩膊痛延左腳及右腳又延及左右手不能行動或作風症而用藥酒或作血虛而用四物湯一咽即痛蓋覆稍熱及用針砭痛益甚煎服熟地黃或吞虎潛丸又加右齒及面痛甚季秋始請居士診之脉濡緩而弱左脉比右較小或澀尺脉尤弱曰此痿證也彼謂痿證不痛今以肢痛為痿惑也居士曰諸痿皆起于肺熱君善飲則肺熱可知經云治痿獨取陽明陽明者胃也胃主四肢豈特腳邪痿兼濕重者則筋緩而痿軟兼熱多者則筋急而作痛因檢橘泉翁傳示之始信痿亦有痛也又經云酒客不喜甘熱芐味甘而虎潛丸益之以蜜則甘多助濕而動胃火故右齒面痛也遂以人參二錢黃茋錢半白术茯苓生地黃麥門冬各一錢歸身八分黃柏知母各七分甘草四分煎服五貼病除彼遂棄藥季冬復病仍服前方而愈溪南吳道濟妻年踰三十無子診視其脉近和惟尺部覺洪滑耳問得何病曰子宫有熱血海不固爾道濟曰然每行人道經水則來乃喻以丹溪大補丸加山茱萸白龍骨止澀之藥以治其內再以亂髮及白礬灰黃連五倍子為末用指㸃水染入隂戶以治其外依法治之果愈而孕吳傳芳妻年逾五十病左腳膝孿痛不能履地夜甚于晝小腹亦或作痛診其脉浮細緩弱按之無力尺脉尤甚病屬血衰遂以四物湯加牛膝紅花黃柏烏藥連進十餘貼而安吳良鼎形瘦而蒼年逾二十忽病咳嗽咯血兼吐黑痰醫用參术之劑病愈甚居士診之兩手寸關浮軟兩尺獨洪而滑此腎虛火旺而然也遂以四物湯加黃柏知母白术陳皮麥門冬之類治之月餘尺脉稍平腎熱亦減依前方再加人參一錢兼服枳术丸加人參山梔以助其脾六味地黃丸加黃柏以滋其腎半年全愈吳富孫之媳年幾三十因夫在外納寵過于憂鬱患咳嗽甚則吐食嘔血兼發熱惡寒自汗醫用葛氏保和湯不效居士診其脉皆浮濡而弱按之無力晨則近駛午後則緩曰此憂思傷脾病也脾傷則氣結而肺失所養故嗽家人曰神醫也遂用麥門冬片黃芩以清肺陳皮香附以散鬱人參黃蓍芍藥甘草以安脾歸身阿膠以和血服數貼病稍寬後每貼漸加人參至五六錢月餘而愈竦塘黃崇貴年三十餘病水腫面光如胞腹大如箕腳腫如槌飲食減少居士診之脉浮緩而濡兩尺尤弱曰此得之酒色宜補腎水家人駭曰水勢如此視者不曰通利則曰滲泄先生乃欲補之水不益劇耶曰經云水極似土正此病也水極者本病也似土者虛象也今用通利滲泄而治其虛象則下多亡隂滲泄耗腎是愈傷其本病而增土濕之勢矣豈知亢則害承乃制之㫖乎遂令空腹服六味地黃丸再以四物湯加黃柏木通厚朴陳皮參术煎服十餘貼腫遂減半三十貼全愈侍御涇縣蕭君吉夫年逾五十患眩暈溲澀體倦夢遺心跳通夜不寐易感風寒諸藥俱不中病居士診之脉或浮大或小弱無常曰此虛之故也丹溪云肥人氣虛宜用參茋又云黑人氣實不宜用之果從形歟抑從色歟居士熟思之色雖黑而氣虛當從形治遂以參茋為君白术茯苓木通為臣山梔子酸棗仁麥門冬為佐陳皮神曲為使煎服晨吞六味地黃丸夜服安神丸餘年病安休寧程勇年三十餘久病癎症多發于晨盥時或見如黃狗走前則昏瞀仆地手足瘈瘲不醒人事良久乃蘇或作痰火治而用芩連二陳湯或作風痰治而用全蝎姜蠶夀星丸或作痰迷心竅而用金箔鎮心丹皆不中病居士診之脉皆緩弱頗弦曰此木火乘土之病也夫早晨陽分而狗陽物黃土色胃屬陽土虛為木火所乘矣經云諸脉皆屬於目故目擊異物而病作矣理宜實胃瀉肝而火自息本草云泄其肝者緩其中遂以參茋歸术陳皮神曲茯苓黃芩麥門冬荆芥穗煎服十餘貼病減再服月餘而安學士篁墩程先生形色清癯肌膚細白年四十餘患眩暈四肢倦怠夜寐心悸言亂或用加減四物湯甘寒以理血或用神聖復氣湯辛熱以理氣又或作痰火治或作濕熱治俱不效遣書請居士診之脉皆沉細不利心部散澀曰此隂脉也脾與心必因憂慮所傷宜倣歸脾湯例加以散鬱行濕之藥先生喜曰真切真切服數貼病果向安一夕因懊惱忽變急請診視脉三五不調或數或止先生以為怪脉居士曰此促脉也無足慮焉曰何如而脉變若此曰此必怒激其火然也先生哂曰子真神人邪以淡酒調木香調氣散一匕服之其脉即如常汊口孫以德形肥色紫年逾五十頸項少陽之分􅏴腫如碗居士診之脉浮小而滑乃語之曰少陽多氣少血之經宜補若用尋常驅熱敗毒之藥􅏴潰之後難免别患彼以為然遂煎參茋歸术膏一二斤用茶調服無時蓋茶能引至少陽故也旬餘􅏴潰而起程貴英形長而瘦色白而脆年三十餘得奇疾遍身淫淫循行如蟲或從左腳腿起漸涎而上至頭復下于右腳自覺蟲行有聲之狀召醫疹視多不識其為何病居士往診其脉浮小而濡按之不足兼察其形視其色參諸脉知其為虛症矣傷寒論云身如蟲行汗多亡陽也遂倣此例而用補中益氣湯多加參茋以酒炒黃柏五分佐之服至二三十貼遂愈孫杲年二十餘病咳嗽嘔血盜汗或腸鳴作泄午後發熱居士往視其脈細數無復倫次因語之曰難經云七傳者逆經傳也初因腎水涸竭是腎病矣腎邪傳之于心故發熱而夜重心邪傳之于肺故咳嗽而汗泄肺邪傳之于肝故脅痛而氣壅肝邪傳之于脾故腸鳴而作泄脾邪復傳于腎而腎不能再受邪矣今病兼此數者死不出旬日之外矣果如期而逝野山汪盛妻年踰四十形色蒼紫忽病血崩諸醫莫治或用涼血或用止澀罔效居士察其六脈皆沈濡而緩按之無力以脈論之乃氣病非血病也當用甘溫之劑健脾理胃庶幾胃氣上騰血循經絡無復崩矣遂用補中益氣湯多加參茋兼服參苓白术散崩果愈汪氏子形瘦而脆色白而嫩年踰二十將治裝他出居士診視良久乃語之曰某時病將至矣書寸楮遺之蓋欲其止也彼不以為然後果如期病不起逢村王恕年二十餘因水中久立過勞病疝痛痛時腹中有磊塊起落如滚浪其痛尤甚居士診其脈皆弦細而緩按之似澀曰此血病也考之方書疝有七皆不宜下所治多用溫散之藥以氣言也兹宜變法治之乃用小承氣加桃仁下之其痛如失三日痛復作比前加甚脈之輕則弦大重則散澀思之莫得其說問曾食何物曰食雞卵二枚而已曰已得之矣今以指按喉中吐出令盡而痛解矣黃豹年踰六十病氣喘顧謂其子曰願得石山先生來吾無憾矣其子夤夜舁至視其脈皆縈縈如蛛絲問曰吉凶何如居士久之若有難于言者彼悟曰吾不濟矣是夜書訖標書五紙付其子而逝大坑方細形瘦年三十餘忽病腹痛磊塊起落如波浪然晝輕夜重醫用木香沉香磨服及服六君子湯皆不驗居士診其脉浮緩弦小重按似澀曰此血病也前藥作氣治謬矣彼謂血則有形發時雖有磊塊痛減則消而無迹非氣而何蓋不知有形者血積也無形者血滯也滯視積略輕耳安得作氣論邪若然則前藥胡為不驗遂用四物湯加三稜蓬术乳香沒藥服之痛遂脫然一婦形長色紫妊五月矣托居士脉之以别男女曰脈右大于左脈訣云左大為男右大為女今脈右大當是女邪彼則喜曰我男胎矣往嵗有妊時尊甫先生診之亦謂右脉浮大當是女孕後生男今妊又得是脈可知為男矣後果生男居士曰脈書但道其常莫能盡其變此醫所以貴乎望聞問切也九江鈔厰主事鄭君希大瘦長而色青白性急剛果年三十餘病反胃每食入良久復出又嚼又咽但不吐耳或作氣治而用丁香藿香或作痰治而用半夏南星或作寒治而用姜附藥俱罔效居士脈之皆緩弱稍弦曰非氣非痰亦非寒也乃肝凌脾之病經云能合脈色可以萬全君面青性急肝木甚也脉緩而弱脾土虛也遂用四君子湯加陳皮神曲少佐姜炒黃連以泄氣逆服月餘而愈鈔厰陳庫子其父老年患背􅏴居士診視脉洪緩而濡􅏴腫如碗皮肉不變按之不甚痛微發寒熱乃語之曰若在髆脾經絡交錯皮薄骨髙之處則難矣今腫去脾骨下掌許乃太陽經分尚可治遂用黃蓍五錢當歸羌活甘草節各一錢先令以被蓋暖藥熟熱服令微汗寢熟腫消一暈五服遂安時居士舟去半日其子駕小艇載鵝米追及拜曰吾父更生故來謝耳居士弟樟之妻瘦長色蒼年三十餘忽病狂言披髮倮形不知羞惡衆皆謂為心風或欲飲以糞清或欲吐以痰藥居士診其脉浮緩而濡乃語之曰此必忍饑或勞倦傷胃而然耳經云二陽之病發心脾二陽者胃與大腸也忍飢過勞胃傷而火動矣延及心脾則心所藏之神脾所藏之意皆為之擾亂失其所依歸矣安得不狂內傷發狂陽明虛也法當補之遂用獨參湯加竹􅅹飲之而愈福州李俊年三十餘忽病渴熱昏悶靣赤倦怠居士診之脉皆浮緩而弱兩尺尤甚曰此得之色欲藥宜溫熱其弟曰先生之言誠是也但病熱如此復加熱藥惑矣居士曰寒極生熱此症是也腎虛寒者本病也熱甚者虛象也譬之雷火雨驟而火愈熾日出火斯滅矣遂以附子理中湯煎熟冷服三貼熱渴減半再服清暑益氣湯十餘貼而安李一之年近四十病反食與近鄰二人脉病頗同居士曰二人者皆急於名利惟一之心寬可治遂以八物湯減地黃加藿香為末用密韭汁調服而愈二人逾年果沒一之妻病痢瘦弱久伏牀枕粥食入胃即腹痛嘔吐必吐盡所食乃止由是粒食不下咽者四十餘日醫皆危之居士診曰病與脉應無慮也不勞以藥惟宜飼以米餘使胃常得穀氣白露節後病當獲安如期果愈其侄春年十七時秋間病酒視為小恙居士診之曰脉危矣彼不為然别請醫治而愈惟遍身瘡痍十月間復召詣之其姪出揖以示病已獲安意謂向之診視缺精也復為診之曰不利于春至立春果卒汪世昌形肥色紫年逾三十秋間病惡寒發熱頭痛自汗惡心咯痰惡食醫以瘧治居士診之脉浮濡而緩右寸略弦曰非瘧也此必過勞傷酒所致飲以清暑益氣湯四五服而愈九都許僖形魁偉色黑善飲年五十餘病衄如注嗽喘不能伏枕醫以四物湯加麥門冬阿膠桑白皮黃柏知母進之愈甚居士診之脉大如指脉訣云鼻衄失血沉細宜設見浮大即傾危據此法不救所幸者色黑耳脈大非熱乃肺氣虛也此金極似火之病若補其肺氣之虛則火自退矣醫用寒涼降火之劑是不知素問亢則害承乃制之㫖遂用人參三錢黃蓍二錢甘草白术茯苓陳皮神曲麥門冬歸身甘溫之藥進之一貼病減十貼病痊後十餘年復診之語其子曰越三年夀止矣果驗一婦長瘦色黃白性躁急年三十餘常患墮胎已七八見矣居士診之脉皆柔軟無力兩尺雖浮而弱不任尋按曰此因胎墮太多氣血耗甚胎無所滋養故頻墮譬如水涸而禾枯土削而木倒也況三月五月正屬少陽火動之時加以性燥而激發之故墮多在三五七月也宜大補湯去桂加黃柏黃芩煎服仍用研末蜜丸服之庶可保全服半年胎果固而生二子一婦年踰三十久瘧瘧止有妊五月忽病腹痛泄㵼頭痛發渴右脉浮滑左則細滑居士以四君子湯加石膏黃芩煎服二貼頭痛泄瀉雖除又加肛門脹急其夫欲用利藥居士曰耐煩二日候胃氣稍完然後以四物湯加酒大黃檳榔利三四行脹急稍寬再服枳术丸加黃芩歸身一料病去而胎亦無損一女年十五病心悸常若有人捕之欲避而無所也其母抱之於懷數婢護之于外猶恐恐然不能安寢醫者以為病心用安神丸鎮心丸四物湯不效居士診之脉皆細弱而緩曰此膽病也用溫膽湯服之而安居士之甥王䆠體弱色脆常病腹痛惡寒發熱嘔泄踡卧時或吐蟲至三五日或十數日而止或用丁沉作氣治或用姜附作寒治或用消尅作積治或用燥烈作痰治罔有效者居士診視脉皆濡小近駛曰察脈觀形乃氣虛兼鬱熱也遂用參蓍歸术川芎茯苓甘草香附陳皮黃芩芍藥服之而安或曰諸痛不可用參蓍并酸寒之劑今犯之何也曰病久屬鬱鬱則生熱又氣屬陽為表之衛氣虛則表失所衛而賊邪易入外感激其內鬱故痛大作今用甘溫以固表則外邪莫襲酸寒以清內則鬱熱日消病由是愈胡本清甫形肥色紫年踰七十忽病瞀昧但其目系漸急即合眼昏懵如瞌睡者頭面有所觸皆不避少頃而蘇問之曰不知也一日或發二三次醫作風治病加重居士診其脉病發之時脉皆結止蘇則脈如常但浮虛耳曰此虛病耳蓋病發而脈結者血少氣劣耳蘇則氣血流通心志皆得所養故脈又如常也遂以大補湯去桂加麥門冬陳皮補其血氣而安三子俱邑庠生時欲應試而懼居士曰三年之內保無恙也越此非豫所知果驗石門陳奈形短頗肥色白近蒼年踰二十因祈雨過勞遂病手足瘈瘲如小兒發驚之狀五日勺水不入口語言艱澀或作痰火治或作風症治皆不驗居士視之脉皆浮緩而濡按之無力曰此因勞倦傷脾土極似木之病也經云亢則害承乃制是矣夫五行自相制伏平和之時隱而不見一有所負則則所勝者見矣今病脾土受傷則土中之木發而為病四肢為之瘈瘲也蓋脾主四肢風主動故也若作風痰治之必致于死惟宜補其脾土之虛則肝木之風自息矣遂以參术為君陳皮甘草歸身為臣黃柏麥門冬為佐經云泄其肝者緩其中故用白芍為使引金泄木以緩其中一服踰宿遂起服至十餘貼全安陳校瘦長而脆暑月過勞飢餘燒酒遂病熱汗昏懵語亂居士視之脈皆浮小而緩按之虛豁曰此暑傷心勞傷脾也蓋心藏神脾藏意二藏被傷宜有此症法宜清暑以安心益脾以寧意遂用八物湯加麥門冬山梔子陳皮煎服十餘貼而愈竹園陳某形瘦而蒼年踰五十居士診視其脉皆弦澀而緩尺脈浮而無根曰尺脈當沉而反浮所主腎水有虧其餘脉皆弦澀而緩者弦脈屬木澀為血少緩脈屬脾以脈論之似係血液枯稿而有肝木淩脾之病非膈則噎也問之胸膈微有礙曰不久膈病成矣病成非藥可濟後果病膈而卒陳鋭面黑形瘦年三十餘患鼻衄發熱惡寒消穀善飢疲倦或自汗嘔吐居士診之脉細且數約有六至曰丹溪論瘦黑者鼻衄者脈數者參茋皆所當禁固也然不可執為定論脈經云數脈所主其邪為熱其症為虛宜人參三錢黃蓍二錢生甘草陳皮黃柏白术歸身生地黃山梔子生芍藥遞為佐使服之果安南畿提學黃公年四十餘溲精久之神不守舍夢亂心跳用清心蓮子飲無效又取袖珍方治小便出髓條藥服之又服小兔絲子丸又服四物加黃柏俱無效居士診視一日之間其脈或浮濡而駛或沉弱而緩曰脉之不常虛之故也語曰無而為有虛而為盈難乎有恆此之謂乎其症初因腎水有虧以致心火亢極乘金木寡于畏而侮其脾此心脾腎三經之病也理宜補脾為主兼之滋腎養心病可痊也方用人參為君白术茯神麥門冬酸棗仁山梔子生甘草為佐蓮肉山查黃柏陳皮為使其他牡犡龍骨川芎白芍熟芐之類隨其變症而出入之且曰必待人參加至五錢病脫公聞言疑信相半服二十餘日人參每服用至三錢溲精覺減半矣又月餘人參加至五錢病全減公大喜曰初謂人參加至五錢病脫果然醫其神乎凡此皆活法非定方也其妙如此殆非心通造物而執其死生之柄者歟居士所著有重集脉訣刋誤二卷內經補注若干卷本草㑹編若干卷惠及後學尤為不淺然非通儒者敢望其門墻也哉論曰醫之用藥如將之用兵苟非其人則殺傷衆矣悲夫昔鄧禹常歎曰吾統百萬之衆未嘗妄殺一人後世必有興者居士不惟不誤殺而已且能起病之垂死者無慮數千百人其子孫又當何如雖然居士有道者豈為是而為之者耶右傳借觀者衆因不能應故共與梓之嘉靖二年四月望日門人周臣許忠謹識石山醫案附録
