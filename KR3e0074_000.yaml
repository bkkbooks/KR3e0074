body:
  text: 石山醫案醫家類提要臣等謹案石山醫案三卷明陳桷編桷祁門人學醫於同邑汪機因取機諸弟子所記機治療效驗裒為一集每卷之中略分門類為次自宋金以來太平惠民和劑局方行於南河閒原病式宣明論方行於北局方多溫燥之藥河閒主㵼火之說其流弊亦適相等元朱震亨始矯局方之偏通河間之變而補陰之說出焉機所作推求師意一書實由戴元履以溯震亨故其持論多主丹溪之法然王氏明醫雜著株守丹溪主於過用苦寒機復為論以辨之其文今附醫案之末則機亦因證處方非拘泥一格者矣其隨試輒效固有由也舊本又有機門人程鐈所作病用參耆論一篇又有機所作其父行狀及李汛所作機小傳今亦併録之備參考焉乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1a152e95821e10302777258eff24db37bd833d5ea9a9089eca588fca92efc71f
