body:
  text: 石山醫案卷下明陳桷撰答銀臺宋公書醫以望聞問切四者為務蒙示貴恙祇得問之一事而已餘三事俱莫得而詳也依命奉去藥方或效或否故難預必兹以理論多屬於隂虛而兼有熱也經曰一勝則一負蓋血者隂也隂虛則陽亢理之必然陽亢熱動宜其血得熱而妄行或嗽或吐不免有血此皆隂虛發熱之病理宜滋隂養血清熱潤肺是其治焉此特論其理之常也其中又有變其常者亦當變其常以治之矣經曰衝任二脈為血之海主滲灌溪谷而陽明為之長陽明者胃也或有勞動損其衝任則血不得滲灌而越上於上竅故陽明胃脈亦失所養或飲食無味或食則難飢或惡心嘔吐或胸膈痞悶或大便不常此又初因隂虛而終致於陽虛也夫因隂虛而致陽虛則滋隂降火之法又難例用當從東垣陽生隂長而用甘溫之劑矣經曰陽氣者精則養神柔則養筋蓋心主血而藏神肝主筋而藏血若胃之陽氣有虧是陽氣之精者亦虛而心神失養不能以主血陽氣之柔者亦損而肝筋失養不能以藏血心既不能主血肝又不能藏血欲其血之不妄行也難矣此又隂變為陽之病豈可以其隂虛例治而損其陽也嘗考褚氏遺書有曰人生十六精始通未及十六而先損其精則骨髓未滿後必有難名之疾得聞所患已犯褚氏之戒必須逺色節欲以固其本然後調之以藥以治其末庶幾內外兼修本末兩盡病之愈也有日矣苟徒恃乎藥而無敬謹之功是謂舍重就輕欲求病愈難哉四物湯加黃柏知母乃滋隂降火妙劑若飲食無味或飲食不思此方又難例用須宜兼用四君子湯仲景曰血虛氣弱宜用人參人參不惟補氣亦補血也况藥無定性與熱藥同用則熱寒藥同用則寒今用人參而以寒藥制之人參雖溫亦莫能逞其勢矣又曰人參補氣今以耗氣之藥監之雖欲補氣亦莫恣其性矣幸毋以南兆見疑東垣北人也常用人參考之東垣書可證矣但加減活法在乎病者消息出入如嗽加麥門冬痰加貝母咯血加藕節氣喘加阿膠痞悶加枳實二方相合名曰八物湯兼補血與氣也請與髙明議其可否一人靣色蒼白年四十六嵗好酒色犬肉三月間因酒連有二夜房事遂病左腹痛甚後延右腹續延小腹以及滿腹皆痛日夜呌號足不能升卧不能仰汗出食阻自用偹急丸利二三行而隨止痛仍不減豫診之脈皆細駛右脈頗大於左獨脾脈弦而且滑扶起診之右脈亦皆細數恐傷酒肉用二陳湯加黃芩山查麴蘖進之不效再用小承氣湯仍復不利蜜煎導之亦不利乃以大承氣湯利二三行痛減未除令其住藥只煎山查飲之次日煩燥嘔惡渴飲涼水則覺惡止爽快次早再診脈皆隱而不見四肢逆冷煩燥不寧時復汗出舉家驚愕疑是房後隂症擬進附子理中湯豫曰此治內寒逆冷也活人書云四逆無脈當察症之寒熱今觀所患多屬於熱况昨日脈皆細數靣色近赤又兼酒後而病六脈遂絶蓋由壯火食氣也四肢者諸陽之本氣被壯火所食不能營於四肢故脈絶而逆冷也此類傷暑之症正合仲景所謂熱厥者多寒厥者少急用大承氣湯下之之類向雖下以大承氣其熱尚有未盡難以四逆湯症與比今用附子熱藥寧不助火添病耶如不得已可用通脈四逆湯尚庶幾焉以其內有童便豬膽汁監制附毒不得以肆其虐也連進二服脈仍不應逆冷不回渴飲煩躁小便不通糞溏反頻腹或時痛更進人參白虎湯二貼躁渴如舊更用參术各三錢茯苓麥門冬車前各一錢北五味當歸各五分煎服一貼脈漸隱隱見如蛛絲豫曰有生意也仲景論絶脈服藥微續者生脈暴出者死是也左手左腳亦略近和不致冰人右之手足如舊逆冷但口尚渴大便尚溏一日夜約有十數次小便不通余曰渴而小便不利者當利其小便遂以天水散冷水調服三四劑不應再以四苓散加車前山枝煎服二貼小便頗通但去大便而小便亦去不得獨利豫曰小便不利煩渴未除蓋由內熱耗其津液也大便尚溏者亦由內熱損其陽氣陽氣不固而然也遂用參术各三錢茯苓錢半白芍車前門冬各一錢山枝七分北五味五分連進數服至第九日逆冷回脈復見諸症稍減而向安矣一人年逾四十靣色蒼白平素內外過勞或為食傷則咯硬痰而帶血絲因服寒涼清肺消痰藥至五六十貼聲漸不清而至於啞夜卧不寐醒來口苦舌乾而常白胎或時喉中閣痛或胸膈痛或噯氣夜食難消或手靠物久則麻常畏寒不怕熱前有􅒃疝後有內痔遇勞則發初診左脈沉弱而緩右脈浮軟無力續後三五日一診心肺二脈浮虛按不應指或時脾脈輕按閣指重按不足又時或駛或緩或浮或沉或小或大變動全無定凖夫脈不常血氣虛也譬之虛偽之人朝更夕改全無定準的實之人朝斯夕斯常久不移以脈參證其虛無疑虛屬氣虛為重也蓋勞則氣耗而肺傷肺傷則聲啞又勞則傷脾脾傷則食易積前疝後痔遇勞而發者皆因勞耗其氣上虛下陷不能升舉故也且脾喜溫畏寒而肺亦惡寒故曰形寒飲冷則傷肺以已傷之脾肺復傷於藥之寒涼則聲安得不啞舌安得不胎胎者仲景謂胃中有寒丹田有熱也夜不寐者由子盜母氣心虛而神不安也痰中血絲者由脾傷不能裹血也脾痛噯氣者氣虛不能健運故鬱於中而噯氣或滯於上則胸痛也遂用參茋各四錢麥門歸身貝母各一錢逺志酸棗仁牡丹皮茯神各八分石菖蒲甘草各五分其他山查麥芽杜仲隨病出入煎服年餘而復益以寧志丸藥前病日漸愈矣且此病屬於燥熱故白术尚不敢用况他燥劑乎一人年十五色黃悴十二月間忽嘔瘀血一二碗隨止當請小兒科丁氏調治肌體尚弱常覺頭暈近於三月間天熱行路出汗逾日又少費力頗倦日昃頓然昏暈不省人事手足擾亂顛倒錯亂將一時久方定次日亦然續後每日午時前後如期發一次近來漸早自辰至午連發二次漸至三四次比前稍輕發時自下焦熱上至胸壅塞則昏暈良久方蘇始疑是瘧或癎醫云火動又云痰症用牛黃丸以竹􅅹薑汁磨服二次共四丸又與煎藥多清爽火之劑服後每日只發一次止則汗多口乾食少身熱時多涼時少豫脈之皆浮虛洪數不任尋按坐起則覺略小亦不甚數脈書曰數脈所主為熱其症為虛三日後再診左脈小而滑右脈大而滑獨肺部浮軟按之似蟄蟄有聲與昨脈不同者虛之故也夫陽氣者清純沖和之氣也或勞動過度或酒食過傷則擾動其陽變而為邪熱矣然脾胃以陽氣為主陽變為熱血必沸騰而越出於上矣昏暈者由熱熏灼故神昏暈倒而類風也風之旋轉運動與火相類每覺下焦熱上乃脾火塞而即發者脾脈從足入腹至胸今下焦熱上乃脾火也然胸膈心肺之分為陽之位清陽居上而邪熱擾之則陽不得暢逹而心肺之神魄不免為之而昏亂矣况五臟皆賴胃氣以培養胃受火邪則五臟皆無所稟而所藏之神亦無所依故肺之魄心之神肝之魂脾之意腎之志安得不隨之潰亂躁擾而昏瞀耶多發於午前後者乃陽氣所主之時陽為邪擾不能用事故每至其時而輒發也且汗多津液泄口乾津液少醫用牛黃硃砂琥珀南星半夏等而復燥之是愈益其燥故暫止而復發不能拔去其病根也因取參茋各二錢半逺志山查川芎黃芩各七分天麻茯神麥門各一錢甘草陳皮各五分歸身八分白术一錢半煎服十餘貼而病不復發矣一人年逾三十神色清減初因傷寒過汗是後兩足時冷身惡寒食則易飢日見消瘦夢遺甚頻筋骨痛疼久伏床枕不出門户醫用滋隂降火不效豫視左脈浮虛而緩右脈浮弦而緩此陽虛也病者言易飢善食夢遺甚頻似屬隂虛若作陽虛而用參耆恐增病矣豫故為之備論其病古人謂脈數而無力者隂虛也脈緩而無力者陽虛也今脈皆浮虛弦緩則脈為陽虛可知參矣以症論之病屬隂虛隂虛則發熱午後屬隂當為午後則遍身發熱惡熱揭胸露手蒸蒸熱悶而煩躁也今患並無是症何得認作隂虛夫陽虛則惡寒雖天暖日和猶恐出門怕寒惡風今患兩足時冷身多畏寒皆陽虛之驗矣又被汗多亡陽非陽虛而何今曰食則易飢非隂虛火動也蓋脾胃以氣為主氣屬陽脾胃之陽已虛又被苦寒屬隂之藥以㵼其陽則陽愈虛而內空竭須假榖氣以扶助之故易飢而欲食食亦不生肌肉也經曰飲食自倍腸胃乃傷又曰飲食不為肌膚其此之謂歟夢遺亦非特隂虛經曰陽氣者精則養神柔則養筋今陽既虛則陽之精氣不能養神而心藏神神失所養則飄蕩飛揚而多夢矣陽之柔氣不能養筋而肝主筋以藏魂筋失所養則遍身筋骨為之疼痛魂亦不藏故夢寐欠安何得而不遺乎經曰氣固形實陽虛則不能固而精門失守此遺之所以頻而不禁也經曰腎者胃之門也今若助陽以使其固養胃以守其關不患遺之不止矣遂用參耆各二錢白术一錢甘草五分枳實香附山查韭子各五分煎服半年隨時令寒暄升降而易其佐使調理而安一人年近六十靣色蒼白病左耳聾三十年矣近年來或頭左邊及耳皆腫潰膿膿從耳出甚多時或又腫復膿今則右耳亦聾屢服袪風去熱逐痰之藥不效豫診左手心脈浮小而駛肝腎沉小而駛右脈皆虛散而數此恐乘輿逺來脈未定耳來早脈皆稍斂不及五至非比日前之甚數也夫頭之左邊及耳前後皆屬於少陽也經曰少陽多氣少血今用風藥痰藥類皆燥劑少血之經又以燥劑燥之則血愈虛少矣血少則澀滯澀滯則壅腫且血逢冷則凝今復以寒劑凝之愈助其壅腫久則鬱而為熱腐肉成膿從耳中出矣漸至右耳亦聾者脈絡相貫血氣相依未有血病而氣不病也是以始則左病而終至於右亦病矣况病久氣血已虛且人年六十血氣日固而又出外勞傷氣血又多服燥劑以損其氣血膿又大泄已竭其氣血則虛而又虛可知矣以理論之當以滋養氣血氣血健旺則運行有常而病自去矣否則不惟病且不除而腦􅂒耳疸抑亦有不兑矣人參二錢黃茋三錢歸身白术生薑各一錢鼠粘子連翹柴胡陳皮各六分川芎片芩白芍各七分甘草五分煎服數十貼而安一孺人年近五十病腹痛初從右手指冷起漸上至頭則頭如冷氷澆灌而腹痛大作痛則遍身大熱熱退則痛亦止或過食或不食皆痛每常或一年一發近來二三日一發逺不過六七日醫用四物加柴胡香附不應更醫用四君木香檳榔亦不效又醫用二陳加紫蘇豆䓻又用七氣湯等劑皆不效豫疹脈皆微弱似有似無或一二至一止或三五至一止乃陽氣大虛也以獨參五錢陳皮七分煎服十餘貼而愈夫四肢者諸陽之末頭者諸陽之會經曰陽虛則惡寒又曰一勝則一負陽虛隂往乘之則發寒隂虛陽往乘之則發熱今指稍逆冷上至於頭則陽負隂勝可知矣陽負則能健運而痛大作痛作而復熱者物極則反也及其隂陽氣衰兩不相爭則熱歇而痛亦息矣况脾胃多氣多血經也氣能生血氣不足則血亦不足仲景曰血虛氣弱以人參補之故用獨參湯服而數年之痛遂愈矣一人年踰三十神色怯弱嘉靖八年客外七月患熱淋諸藥不效至十一月行房方愈九年正月復作亦行房而愈至三月傷寒咳嗽有痰兼事煩惱延至十月少愈後復作服蘆吸散而愈但身熱不解因服小便腹內膨脹小腹作痛後又因晚卧左脅有氣觸上痛不能睡飲食減半四肢無力食則腹脹痛或㵼兼胸膈飽悶口舌乾燥夜卧盜汗從腰已下常冷久坐腰痛腳軟手心常熱診其左手心脈浮數而滑腎肝二脈沉弱頗緩右手肺脈浮虛而駛脾脈偏弦而駛命門散弱而駛第二日再診心肝二脈細軟稍不見駛矣腎脈過於弱肺脈浮軟亦不見駛脾脈頗軟命門過浮略堅余曰膀胱者津液之府氣化出焉淋者由氣餒不能運化故津液鬱結為熱而然也房後而愈者則鬱結流利而熱解矣三月天日和煦何得傷寒多由肺氣不足莫能護衛皮毛故為風邪所襲鬱熱而動其肺以致痰嗽也得蘆吸散而愈者以辛溫豁散其痰與熱也嗽止身熱不退者因嗽久肺虛肺虛則脾弱脾肺之氣不能榮養皮肉故熱作也經曰形寒飲冷則傷肺又曰脾胃喜溫而惡寒今服小便之寒涼寧不愈傷其脾肺耶是以腹脹作痛脅氣觸上或㵼或汗種種諸病皆由損其脾肺也而脈時或變易不常者亦由氣血兩虛虛而為盈難乎有常矣遂用參茋各二錢茯苓白术各一錢歸身牛膝各七分厚朴陳皮木香甘草各五分薄桂三分煎服二十餘貼諸症悉退後因解頭勞倦諸症復作來就余治脈與前頗同但不數不駛而已仍用參茋各三錢麥門歸身厚朴枳實甘草黃苓等劑而愈書曰五志過為病非藥可治須以情勝古今方書多略而不言遇有此疾無例可推因搜採前賢治例著之於後以示將來者焉如怒傷肝肝屬木怒則氣併於肝而脾土受邪木太過則肝亦自病喜傷心心屬火喜則氣併於心而肺金受邪火太過則亦自病悲傷肺肺屬金悲則氣併於肺而肝木受邪金太過則肺亦自病恐傷腎腎屬水恐則氣併於腎而心火受邪水太過則腎亦自病思傷脾脾屬土思則氣併於脾而腎水受邪土太過則脾亦自病寒傷形形屬隂寒勝血則陽受邪寒太過則隂亦自病熱傷氣氣屬陽熱勝寒則隂受病熱太過則陽亦自病凡此數者更相為治故悲可以治怒以愴惻苦楚之言感之喜可以治悲以謔浪褻狎之言戲之恐可以治喜以逼遽死亡之言怖之怒可以治思以汙辱欺罔之言觸之思可以治恐以慮彼忘此之言奪之凡此五者必詭譎怪詐無所不至然後可以動人耳目易人視聼若胸中無材器之人亦不能用此法也熱可以治寒寒可以治熱逸可以治勞習可以治驚經曰驚者平之夫驚以其忽然而遇之也使習見習聞則不驚矣惟勞則氣耗恐則氣奪者為難治喜者少病百脈舒和故也一人因喜成病莊醫切脈為之失聲佯曰吾取藥去數更不來病者悲泣辭家人曰處世不久矣莊知其將愈慰之詰其故引素問懼勝喜可謂得玄關者也一婦因産舌出不收醫以硃砂傅其舌仍命作産子狀令以兩女子掖之乃於壁外潛纍盆碗危處墮地以作聲聲聞而舌收矣夫舌乃心之苖此必産難而驚心火不寧故舌因用力而出也今以硃砂以鎮其心火又使倐聞異聲以恐下經曰恐則氣下故以恐勝之也昔貴人有疾天方不雨更醫十數罔效最後一醫至脈已則以指計甲子曰某夕天必雨竟出貴人疑曰豈謂吾疾不可為耶何言雨而不及藥我也已而夕果雨貴人喜起而行乎庭達旦疾若脫去明日後至之醫來謁貴人喜且問曰先生前日言雨今得雨而瘳何也醫對曰君侯之疾以憂得之然私計君侯忠且仁所憂者民耳以旱而憂以雨而瘳理固然耳何待藥而愈耶一女婚後夫經商二年不歸因不食困卧如癡無他病多向床裡坐此思則氣結也藥難治獨得喜可解不然令其怒因掌其靣詬以外情果大怒而大哭三時許令解之與藥一貼即求食矣豫曰病雖愈得喜方已乃詒以夫回既而果然病不舉一人縣差拿犯人以鐵索項所犯至縣行至中途犯則投河而死犯家告所差人索騙威逼至死所差脫罪未免費財憂憤成病如醉如癡謬言妄語無復知識豫診之曰此以費財而憂必得喜而病可愈也藥豈能治哉令其鎔錫作銀數錠置於其側病者見之果喜握視不置後病遂愈此謂以喜勝憂也一女與母相愛既嫁母喪女因思母成疾精神短少怠倦嗜卧胸膈煩悶日常懨懨諸藥不應豫視之曰此病因思非藥可愈彼俗酷信女巫巫托神降言禍福謂之卜童因令其夫賄囑之托母降言女與我前世有寃汝故托生於我以害我也是以汝之生命尅母我死因汝今在隂司欲報汝讐汝病淹淹實我所為我生則與之母子死則與之寇仇夫回謔其婦曰汝病如此我他往可請童婆卜之何如婦應曰諾遂請卜一如夫所言女聞大怒詬曰我因母病母反我害我何思之有耶遂不思病果愈此以怒勝思也一官素謹言一日會賔筵中有蘿蔔頗大客羡之主曰尚有大如人者客皆笑以為無主則悔恨自咎曰人不見如是大者而吾以是語之宜其以吾言為妄為笑也因而致疾藥不應其子讀書逹事思父素不輕言因而愧赧成疾必須實所言庶可解官所抵家往返十餘日遂遣人抵家取蘿蔔如人大者至官所復會舊賔請父強疾而陪酒酣令車載置席前客皆驚訝其父大喜而疾愈重大之病一日三脈多變難治沉痾日日脈不移亦難治伏經脈最難求如積熱之久脈反沉細而外症又寒苟非兼以望聞問切何可得也世俗諱疾試醫醫復諱情妄臆而豪貴婦女往往不得望聞豈不大錯論病必分兼經専經錯經伏經知有賔主而後分標本以處方兼經併發如兩感專經獨發如太陽表症錯經亂發如百合狐惑病伏經反發如熱極似水君臣佐使外可用一標使如劑中合從辛以逹金則取引經一味辛者倍加之故其效速一土人形肥色白因名醫雜著謂人皆隂不足服補隂丸至數十年乃病虛胖短氣豫反之用辛熱劑決去滯餘而燥其重隂乃得平和無恙此則未逹方書而往自誤不可不戒也前數條出醫通豫嘗熟諳以其暗與已合故録之不忘詩曰我思古人實獲我心此之謂也一婦年三十餘十八胎九殰八夭復因驚過甚遂昏昏不省人事口唇舌皆瘡或至封喉下部白帶如注如此四十餘日或時少省至欲自縊自悲不堪或投涼劑解其上則下部疾愈甚或投熱劑或以湯藥薰蒸其下則昏暈欲絶脈之始知為亡陽症也急以鹽煮大附子九錢為君制以薄荷防風佐以薑桂芎歸之屬水煎入井水冷與之未盡劑鼾睡通宵覺則能識人衆訝曰何術也醫曰方書有之假對假真對真爾上乃假熱故以假冷之藥從之下乃真冷故以真熱之藥反之斯上下和而瘡解矣續後再服調元氣藥乃生二子續後又病瘧一年亦主以養元氣待飲食大進然後劫以毒藥吐下塊物甚多投附子湯三錢而愈此條亦出醫通以其治病有法用藥有權可謂知通變者也故録之以為法一人四十餘色黃白季春感冒發汗過多遂患左腳腿􅀈厥隂之分微腫而痛不能轉動醫作隂毒治以艾灸豫曰隂毒雖無肉變髙焮之勢纒綿月餘內必有瘀膿令用毫針深探之惟黃水數點而已後又更醫以鋒針於灸瘡內深入寸許則血大出認為隂毒似有可疑吾以屬於筋痛經曰謂筋痿者耶痿雖軟易其亦有痛者且其痛時遍身筋皆腫脹而右腳內亷筋亦急痛不能屈伸以此驗之筋痛可知矣經曰厥隂少血之經筋之所主過汗則亡血而筋失所養故急痛也腿􅀈腫者蓋人身之血猶江河之水洪泛則流沙走石彼細流淺瀨則此阻彼礙而壅腫矣經曰怯者著而成病是也兼之脾胃太虛嘔逆噯氣飲食少進經曰胃者水榖之海脾主與胃與胃行其津液以養皮肉筋脈今胃不受而脾不運筋脈愈失所養矣又曽加以灸砭焦骨傷筋復耗其血丹溪曰血屬隂難成易虧者也兹則針灸妄施則血虛耗矣欲其疾愈豈可得哉且經曰筋枯者舉動則痛是無血以養俱難治也所幸者精神尚好大便固祕夜卧安靜於此健其脾胃使飲食進則血自生筋自舒腫退痛除庶或可愈其脈初皆細軟而緩按之無力豫以獨參湯一兩一劑與之其效甚速豫適他往更醫復灸又用參茋歸术加涼劑胃氣遂不能回矣再診脈變為滑數脈書言瘡科滑脈未潰宜內消已潰宜補益又曰數脈所主為熱其症為虛是脈與症皆屬於虛亦須大補托而出之治亦同法豈得岐而兩途病居疑似故詳辨之吾常見一婦産後遍身筋痛遂致不救是以亡血故也一兒年十一色白神怯七月間發熱連日父令就學內外俱勞循至熱熾頭痛正合補中益氣湯症失此不治以致吐㵼食少其父知醫乃進理中湯吐瀉少止漸次眼合咽啞不言昏昧不省人事粥飲有礙手常揾住隂囊為灸百會尾骶不應其父質於豫豫曰兒本氣怯又當暑月過勞經曰勞則氣耗又曰勞倦傷脾即此觀之傷脾之病也身熱者經曰陽氣者煩勞則張蓋謂氣本陽和或勞煩則陽和之氣變為邪熱矣頭痛者經曰諸陽皆會於頭今陽氣亢極則邪熱熏蒸於頭而作痛也吐㵼者脾胃之清氣不升濁氣不降也目閉者蓋諸脈皆屬於目而眼眶又脾所主脾傷不能營養諸脈故眼閉而不開也咽啞者蓋脾之絡連舌本散舌下脾傷則絡失養不能言也經曰脾胃者水榖之海五藏皆稟氣於脾脾虛則五藏皆失所養故肺之咽嗌為之不利而食難咽故心之神明為之昏瞀而不知人常欲手揾隂囊者蓋無病之人隂升陽降一有所傷則升者降降者升經曰隂陽反作是也是以隂升者降從其類而入厥隂之囊因隂多陽少故手欲揾之也此皆脾胃之病經謂土極似木亢則害承乃制也症似風木乃虛象耳不治脾胃之土而治肝木之風欲兒不死難矣且用參茋术各三錢熟附一錢煎用匙灌半酒杯候看如何服後病無進退連服二三日神稍清目稍開如有生意食仍難咽豫為診之脈皆浮緩不及四至豫曰藥病相宜再可減去附子服之漸漸稍蘇初醫作風熱於治而用荆防芩連蠺歇之類或作驚痰而用牛黃硃砂輕粉等藥此皆損胃之劑豈可投諸兒今得生幸耳實賴其父之知醫也或曰經云無伐天和其症又無四肢厥冷時當苦暑而用附子何也豫曰參茋非附子無速效而經亦曰假者反之正如冬月而用承氣之類此亦稽時從症之意也一婦年三十質脆弱産後咳嗽痰臭或作肺􅏴治愈劇延及兩腳漸腫至膝大便溏小腹脹痛午後發熱靣紅氣促不能向右卧豫診脈虛小而數豫曰凡咳嗽左右向不得眠者上氣促下瀉泄者發熱不為瀉減者此皆病之反也按此皆原於脾經曰脾主諸臭入肺腥臭入心焦臭入肝腐臭自入為穢臭蓋脾不能運行其濕濕鬱為熱釀成痰而臭矣經曰左右者隂陽之道路也脾虛則肺金失養氣劣行遲壅遏道路故咳嗽氣促不能右卧也脾虛必奪母氣以自養故心虛發熱而見於午也脾主濕濕勝則內滲於腸胃為溏泄外滲於皮膚為浮腫令用參术甘草補脾為君白术茯苓滲濕為臣麥門冬以保肺氣酸棗仁以安心神為佐陳皮前胡以消痰下氣為使用東壁土以受陽光最多用之以為引用蓋土能解諸臭用以補土亦易為力矣此竊取錢氏黃土湯之義也服一帖前症略減病者甚喜豫曰未也數帖後無反復方是佳兆否則所謂過時失治後發寒熱真陽脫矣泄而腳重脾氣絶矣何能收救豫姪文煥妻亦患此醫作肺􅏴治而用百合煎湯煮粥食之反劇豫診其脈細弱而緩治以參茋甘溫等劑不二三貼而愈此由治之早也一人年逾四十形肥色蒼因勞後入房感風夜半瘧作自汗寒少熱多一日一作醫用清脾小柴胡四獸等劑不效漸至二日或三日一發豫診左脈浮洪虛豁而數右脈虛小散數頭眩耳鳴四肢懶倦手足麻大便溏左脅瘧毋時或夢遺發則嘔吐多痰或辰或午發至酉戍乃退每至三十日連發二次子時發至離明其發微辰時發至酉戍其發如常豫用參茋歸术麥門知母厚朴陳皮大劑與之初服一劑痞塊反髙小腹脹痛豫曰藥若不瞑眩厥疾弗瘳再當服之數貼後脈皆稍靜不數病者曰脈平而病不減何也豫曰瘧邪已深非數劑之藥旦夕之功所能愈當久服待春分陽氣發揚方得全愈苟惑人言而止藥不惟瘧不能止或癆或鼓難免後憂夫瘧因感風暑寒水而作也經曰皮膚之外腸胃之內氣血之所舍也氣屬陽風暑陽邪而中於氣血屬隂寒水隂邪而中於血先中陽邪後中隂邪則先寒後熱先中隂邪後中陽邪則先熱後寒陽邪多則熱多渴而有汗隂邪多則寒多而熱少氣血受邪而居於其舍悍衛之氣運行不息不受邪也日行陽二十五度夜行隂二十五度每一刻則周身一度行與邪遇則邪壅遏其道路故與相摶而瘧作也摶則一勝一負負則不與之摶而悍衛無礙故瘧止矣夫邪之盛衰因氣血之盛衰氣血盛邪亦盛氣血衰邪亦衰久則氣血衰或靜養二三日氣血復盛而邪亦盛悍衛行與之遇又復相抗而瘧作此瘧每三十日速發二次者蓋二十八九三十日晦日也隂極陽生之時夜半微陽始生而力尚弱故瘧發亦輕辰則陽旺矣故瘧亦重此瘧所感陽邪居多故隨陽氣盛衰而為之輕重其三日一發者非入於藏也由氣血盛衰而然非若傷寒之傳經也或曰邪既因氣血而盛衰今補其氣血未免邪亦盛矣豫曰邪之所湊其氣必虛氣血未補終未至於強健強健邪無容留矣經曰邪正不兩立是也夫瘧三日一發丹溪以發日之辰分屬三隂而藥無三隂之别總用撫芎當歸紅花蒼术黃柏等藥掣起陽分瘧入隂分由陽虛陷入也須宜陽分助氣之藥加血藥引入隂分方可掣起専用血藥祗恐邪愈內陷何以能掣起哉一人年十九靣白質弱因作文過勞夢遺遂吐血碗許自是微咳倦弱後身忽大熱出疹疹愈隂囊癢甚搓擦水流敷以壁土囊腫大如盞許遂去土以五倍塗少蜜炙為末敷之遂愈因感風寒其嗽尤甚繼以左右脅痛豫診脈虛而數見其畏風寒嘔惡倦動糞溏氣促豫曰此金極似火也夫心屬火而藏神腎屬水而藏志二經俱屬少隂而上下相通今勞思則神不寧而夢志不寧而遺遺則水不升而心火獨亢也肝屬木而藏血其象震震為雷心火既亢則類相應引動龍雷之火載血而越出乎上竅矣肝脈環繞隂器亦因火擾而痛癢腫脹也火勝金故肺金虛而乾咳皮毛為之合亦為火鬱而發疹大腸為之府故亦傳導失宜而糞溏然金虛不能平木故木火愈旺而凌脾脾虛則嘔惡而食減經曰壯火食氣脾肺之氣為壯火所食故倦於動作而易感風寒也經言兩脅者隂陽往來之道路也為火阻礙則氣不利而痛矣然火有虛有實有似火而實非火故經言有者求之無者求之虛者責之實者責之此治火之大法也前病之火皆虛非水濕之可折服惟甘溫之劑可以怯除譬之龍雷之火日出則自潛伏矣若用苦寒降火正如雨驟雷烈而火愈熾盛矣世醫治火不惟不求之有無虛實専泥明醫雜著咳嗽吐紅皆屬隂虛悮服參茋不救之語槩用滋隂等劑况此服滋隂藥已百餘貼而病反劇豈可仍以隂虛治之耶且經言形寒飲冷則傷肺又謂脾胃喜溫而惡寒今用甘溫健其脾則肺金不虛而咳嗽氣促自愈肝木有制而脅痛吐血自除虛妄之火亦自熄矣遂用參茋各四錢神曲山查各七分白术貝母麥門冬各一錢甘草五分炒乾薑四分煎服十餘貼脈數減嗽少除精神稍健但後又適新婚不免耗損真隂將何以制其虛妄之火耶蓋咳屬肺金數脈屬火咳而脈數火尅金也冬月水旺而見數脈亦違時也大凡病見數脈多難治療病久脈數尤非所宜此豫所以深為之慮也一婦年三十餘性躁多能素不孕育每啜粥畏飯時或心痛春正忽大作或作氣而用香燥或作痰而用二陳或作火而用寒涼因糞結進潤腸丸遂瀉不禁小便不得獨利又發寒熱熱則咳痰不止寒則戰栗鼓頷肌肉瘦削皮膚枯燥月水不通食少惡心或煩躁而渴或昏昏嗜卧或小腹脹痛諸治罔效醫皆視為死症詣請豫往治之右脈浮大弦數左脈稍斂而數熱來左右脈皆大而數寒來脈皆沉微似有似無經言脈浮為虛脈大必病進丹溪謂脈大如蔥管者大虛也經乂謂弦脈屬木見於右手肝木尅脾土也又以數脈所主為熱其症為虛右脈稍斂者血分病輕也今患素畏飯者是胃氣本弱矣心痛即胃脘痛由脾虛不運故胃脘之陽不降鬱滯而作痛也瀉泄不禁小便不得獨行者蓋陽主固且經言膀胱者津液之府氣化則能出矣今陽虛不固於內故頻泄也膀胱氣虛不化故小便不得獨行也乂寒熱互發者蓋氣少不能運行而滯於血分故發熱血少不得流利而滯於氣分故發寒仲景曰陽入於隂則熱隂入於陽則寒是也寒則戰栗鼓頷者隂邪入於陽明也熱則咳痰不已陽邪入於陽明也此則隂陽兩虛故相交併而然也肌肉瘦削者蓋脾主身之肌肉脾虛食少故瘦削也皮膚枯躁者經曰脾主於胃行其津液脾虛不能運行津液灌溉於肌表故枯躁也月水不通者經曰二陽之病發心脾男子少精女子不月二陽手足陽明腸與胃也陽明虛則心脾皆失所養而血不生故不月也食少惡心躁渴嗜卧皆脾胃所生之症也小腹脹痛者乃陽虛下陷使然也經曰陽病極而下是也乃用人參五錢黃茋四錢白术三錢為君升麻八分茯苓一錢豬苓澤瀉各七分為臣蒼术五分香附七分為佐歸身七分麥門冬一錢為使煎服三貼不效一醫曰此病不先驅邪一主於補所謂閉門留賊一曰此屬隂虛火動今不滋隂降火而徒補氣將見氣愈盛火愈熾矣風鑑相其夫曰姦門青白必主傷妻日者推其命曰運限俱倒其死必矣其夫皺眉告豫曰每日扶之似身漸重皮枯異躁恐不濟矣豫思仲景有曰泄利不止五藏之陽虛於內寒熱互發六府之陽虛於外是則內外兩虛在法不治所恃者年尚壯能受補而矣但病家寧可於死中求活豈可坐以待斃且補藥無速效今服藥不滿四五劑即責以效豈王道之醫乎因令勉服前藥六七貼寒已除但熱不減汗出不止足冷壺盛熱水蒸其足汗亦過於委中矣續後前症漸減始有生意追思醫謂不先去邪者因其寒熱往來也然去邪不過汗吐下三法今病自汗吐痰泄利三者俱矣再有何法而可施乎且病有實邪有虛邪虛可補而實可㵼今病屬虛而以實邪治之虛虛之禍咎將誰歸一謂當滋隂降火因其月事不通病發於夜也且服降火藥遂小腹脹而大便泄是不宜於此矣殊不知滋隂降火皆甘寒苦㵼之劑今病食少泄利明是脾虛且脾胃喜溫而惡寒今泥於是寧不愈傷其胃而益其泄乎吁危哉故不敢不辨石山醫案卷下
